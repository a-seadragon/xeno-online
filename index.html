<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XENO Online</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Noto+Serif+JP:wght@300;400;600;700&family=Cinzel:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{
  --gold:#c9a84c;--gold-l:#f0d080;--gold-d:#8a6820;
  --deep:#080810;--panel:#141422;--panel2:#1c1c30;
  --border:#252540;--border2:#2e2e50;
  --text:#e4ddd0;--dim:#6a6480;
  --red:#c0392b;--red-l:#e74c3c;
  --blue:#2471a3;--blue-l:#3498db;
  --green:#1e8449;--green-l:#27ae60;
  --purple:#7d3c98;
  --cw:88px;--ch:126px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--deep);color:var(--text);font-family:'Noto Serif JP',serif;min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse at 30% 20%,rgba(201,168,76,.04),transparent 50%),
             radial-gradient(ellipse at 70% 80%,rgba(100,50,150,.04),transparent 50%)}
.screen{display:none;min-height:100vh;position:relative;z-index:1}
.screen.active{display:flex;flex-direction:column;align-items:center;justify-content:center}
#game-screen.active{justify-content:flex-start}
/* title */
#title-screen{padding:40px 20px}
.logo-wrap{text-align:center;margin-bottom:28px}
.logo-eye{font-family:'Cinzel',serif;font-size:10px;letter-spacing:10px;color:var(--gold);opacity:.6;margin-bottom:10px}
.logo-main{font-family:'Cinzel Decorative',cursive;font-size:clamp(54px,11vw,104px);font-weight:900;letter-spacing:.15em;
  background:linear-gradient(145deg,#8a6820 0%,#c9a84c 30%,#f0d080 55%,#c9a84c 75%,#8a6820 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  animation:sh 4s ease-in-out infinite;filter:drop-shadow(0 0 24px rgba(201,168,76,.25))}
@keyframes sh{0%,100%{filter:drop-shadow(0 0 16px rgba(201,168,76,.2))}50%{filter:drop-shadow(0 0 36px rgba(201,168,76,.5))}}
.logo-sub{font-family:'Cinzel',serif;font-size:12px;letter-spacing:6px;color:var(--gold);opacity:.5;margin-top:8px}
.ob{display:inline-block;background:rgba(201,168,76,.1);border:1px solid var(--gold-d);
  color:var(--gold);font-family:'Cinzel',serif;font-size:9px;letter-spacing:4px;padding:4px 14px;border-radius:2px;margin-top:10px}
.div{width:180px;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:22px auto}
.cbadge{font-family:'Cinzel',serif;font-size:9px;letter-spacing:2px;padding:3px 10px;border-radius:2px;display:inline-block;margin-bottom:16px}
.cok{background:rgba(39,174,96,.1);border:1px solid var(--green);color:var(--green-l)}
.cerr{background:rgba(192,57,43,.1);border:1px solid var(--red);color:var(--red-l)}
.lcards{display:flex;gap:14px;flex-wrap:wrap;justify-content:center;max-width:560px;width:100%}
.lc{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:24px 20px;
  flex:1;min-width:238px;max-width:258px;transition:border-color .2s}
.lc:hover{border-color:var(--border2)}
.lct{font-family:'Cinzel',serif;color:var(--gold);font-size:13px;letter-spacing:3px;margin-bottom:13px;text-align:center}
.inp{width:100%;background:#0a0a14;border:1px solid var(--border);color:var(--text);
  padding:11px 13px;font-family:'Noto Serif JP',serif;font-size:14px;border-radius:5px;outline:none;
  transition:border-color .2s;margin-bottom:10px}
.inp:focus{border-color:var(--gold)}.inp::placeholder{color:var(--dim)}
.cinp{font-family:'Cinzel',serif;font-size:20px;letter-spacing:8px;text-align:center;text-transform:uppercase}
.btn{width:100%;border:none;padding:13px;font-family:'Cinzel',serif;font-size:12px;letter-spacing:3px;
  text-transform:uppercase;cursor:pointer;border-radius:5px;transition:all .2s}
.btn-g{background:linear-gradient(135deg,#c9a84c,#8a6820);color:#080810;font-weight:700}
.btn-g:hover:not(:disabled){background:linear-gradient(135deg,#f0d080,#c9a84c);box-shadow:0 0 26px rgba(201,168,76,.3)}
.btn-o{background:transparent;border:1px solid var(--border2);color:var(--text)}
.btn-o:hover:not(:disabled){border-color:var(--gold);color:var(--gold)}
.btn:disabled{opacity:.35;cursor:not-allowed}
.btn-sm{width:auto;padding:8px 18px;font-size:10px;letter-spacing:2px}
/* lobby */
#lobby-screen{padding:24px 16px;gap:16px}
.cdsp{font-family:'Cinzel Decorative',cursive;font-size:clamp(30px,6vw,50px);color:var(--gold);
  letter-spacing:.2em;text-shadow:0 0 28px rgba(201,168,76,.3);cursor:pointer;transition:all .2s;user-select:none;text-align:center}
.cdsp:hover{text-shadow:0 0 48px rgba(201,168,76,.6)}
.chint{font-size:10px;color:var(--dim);font-family:'Cinzel',serif;letter-spacing:2px;margin-top:4px;text-align:center}
.slbl{font-family:'Cinzel',serif;font-size:10px;color:var(--dim);letter-spacing:4px;text-transform:uppercase;margin-bottom:10px}
.plist{display:flex;flex-direction:column;gap:7px;width:100%;max-width:420px}
.pr{background:var(--panel);border:1px solid var(--border);border-radius:6px;
  padding:10px 15px;display:flex;align-items:center;gap:9px;transition:all .3s}
.pr.rdy{border-color:var(--green);background:rgba(39,174,96,.05)}
.pdot{width:7px;height:7px;border-radius:50%;background:var(--dim);flex-shrink:0;transition:all .3s}
.pr.rdy .pdot{background:var(--green-l);box-shadow:0 0 7px var(--green)}
.pnm{font-family:'Cinzel',serif;font-size:12px;letter-spacing:2px;flex:1}
.pbg{font-size:8px;font-family:'Cinzel',serif;letter-spacing:1px;padding:2px 8px;border-radius:2px}
.bhost{background:rgba(201,168,76,.15);border:1px solid var(--gold-d);color:var(--gold)}
.brdy{background:rgba(39,174,96,.15);border:1px solid var(--green);color:var(--green-l)}
.bwait{background:rgba(106,100,128,.1);border:1px solid var(--border2);color:var(--dim)}
/* 勝率 */
.stats-row{display:flex;gap:5px;align-items:center;margin-left:auto}
.stat-pill{font-family:'Cinzel',serif;font-size:8px;letter-spacing:1px;padding:2px 7px;border-radius:8px;white-space:nowrap}
.stat-w{background:rgba(201,168,76,.15);color:var(--gold);border:1px solid rgba(201,168,76,.3)}
.stat-d{background:rgba(106,100,128,.15);color:var(--dim);border:1px solid var(--border2)}
.stat-l{background:rgba(192,57,43,.12);color:var(--red-l);border:1px solid rgba(192,57,43,.25)}
/* 結果画面の成績 */
.result-stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:16px}
.rstat-card{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:12px 16px;text-align:center;min-width:100px}
.rstat-name{font-family:'Cinzel',serif;font-size:10px;color:var(--dim);letter-spacing:2px;margin-bottom:8px}
.rstat-nums{display:flex;gap:6px;justify-content:center;margin-bottom:4px}
.rstat-rate{font-family:'Cinzel Decorative',cursive;font-size:20px;color:var(--gold)}
.rstat-label{font-family:'Cinzel',serif;font-size:8px;color:var(--dim);letter-spacing:1px}
/* ── GAME SCREEN ─────────────────────────────────────
   Layout: Header / TurnBar / Opponents(scroll) / CenterBar / MyArea(fixed) / ActionPanel
─────────────────────────────────────────────────────*/
#game-screen{flex-direction:column;padding:0;height:100vh;width:100%;align-items:stretch;overflow:hidden}

/* Header */
.gh{background:var(--panel);border-bottom:1px solid var(--border);padding:9px 16px;
  display:flex;align-items:center;justify-content:space-between;flex-shrink:0;
  box-shadow:0 2px 16px rgba(0,0,0,.5)}
.gtitle{font-family:'Cinzel Decorative',cursive;color:var(--gold);font-size:15px;letter-spacing:3px}
.ginfo{display:flex;gap:10px;align-items:center}
.gspill{display:flex;align-items:center;gap:5px;background:rgba(0,0,0,.35);
  border:1px solid var(--border);border-radius:16px;padding:4px 11px}
.gspill-num{font-family:'Cinzel',serif;font-size:14px;color:var(--gold);font-weight:700;line-height:1}
.gspill-lbl{font-family:'Cinzel',serif;font-size:8px;color:var(--dim);letter-spacing:1px}

/* Turn bar */
.tbar{display:flex;align-items:center;justify-content:center;gap:8px;padding:5px 16px;flex-shrink:0;
  background:linear-gradient(90deg,transparent,rgba(201,168,76,.07),transparent);
  border-bottom:1px solid rgba(201,168,76,.1)}
.tbar-lbl{font-family:'Cinzel',serif;font-size:8px;color:var(--dim);letter-spacing:3px;text-transform:uppercase}
.tnm{font-family:'Cinzel',serif;font-size:13px;color:var(--gold);letter-spacing:2px}
.mytag{background:rgba(201,168,76,.15);border:1px solid rgba(201,168,76,.35);color:var(--gold);
  font-family:'Cinzel',serif;font-size:8px;padding:2px 9px;border-radius:10px;letter-spacing:1px;
  animation:pgold 2s ease-in-out infinite}
@keyframes pgold{0%,100%{box-shadow:0 0 0 0 rgba(201,168,76,.3)}60%{box-shadow:0 0 0 5px rgba(201,168,76,0)}}

/* Opponents area (scrollable) */
.opponents-area{flex:1;padding:10px 12px 6px;display:flex;flex-direction:column;gap:8px;
  overflow-y:auto;min-height:0}

/* Opponent zone */
.ozone{background:var(--panel);border:1px solid var(--border);border-radius:10px;
  padding:10px 13px;transition:all .35s;position:relative;overflow:hidden}
.ozone::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.06),transparent);transition:all .35s}
.ozone.act{border-color:rgba(201,168,76,.45);
  box-shadow:0 0 22px rgba(201,168,76,.1),inset 0 0 22px rgba(201,168,76,.03)}
.ozone.act::after{background:linear-gradient(90deg,transparent,var(--gold),transparent)}
.ozone.ded{opacity:.28;border-color:transparent;background:rgba(10,10,20,.5)}
.ozone.prt{border-color:rgba(52,152,219,.4);box-shadow:0 0 16px rgba(52,152,219,.1)}
.ozh{display:flex;align-items:center;gap:7px;margin-bottom:9px}
.oz-dot{width:7px;height:7px;border-radius:50%;background:var(--dim);flex-shrink:0;transition:all .3s}
.ozone.act .oz-dot{background:var(--gold);box-shadow:0 0 7px var(--gold)}
.ozone.ded .oz-dot{background:var(--red)}
.ozone.prt .oz-dot{background:var(--blue-l)}
.oz-name{font-family:'Cinzel',serif;font-size:11px;letter-spacing:2px;flex:1;color:var(--text)}
.oz-badges{display:flex;gap:4px;flex-wrap:wrap}
.oz-hand{display:flex;gap:5px;align-items:center;flex-wrap:wrap}
.oz-discards{display:flex;gap:3px;flex-wrap:wrap;margin-top:7px;padding-top:7px;
  border-top:1px solid rgba(255,255,255,.04)}
.oz-disc-lbl{font-family:'Cinzel',serif;font-size:7px;color:var(--dim);letter-spacing:2px;
  margin-bottom:3px;opacity:.5;display:block}

/* Center bar: deck visual + log */
.center-bar{display:flex;flex-shrink:0;background:#070710;
  border-top:1px solid var(--border);border-bottom:1px solid var(--border)}
.deck-col{display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:7px 14px;border-right:1px solid var(--border);gap:3px;flex-shrink:0}
.deck-vis{position:relative;width:30px;height:44px}
.deck-card{position:absolute;border-radius:4px;border:1px solid;background:linear-gradient(145deg,#12122a,#1a1a38)}
.deck-card:nth-child(1){top:0;left:0;width:28px;height:40px;border-color:var(--border);z-index:3}
.deck-card:nth-child(2){top:-2px;left:2px;width:28px;height:40px;border-color:var(--border2);z-index:2}
.deck-card:nth-child(3){top:-4px;left:4px;width:28px;height:40px;border-color:rgba(37,37,64,.4);z-index:1}
.deck-num{font-family:'Cinzel Decorative',cursive;font-size:18px;color:var(--gold);font-weight:700;line-height:1;text-align:center}
.deck-lbl{font-family:'Cinzel',serif;font-size:7px;color:var(--dim);letter-spacing:2px;text-align:center}
.rebirth-col{display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:7px 14px;border-right:1px solid var(--border);gap:2px;flex-shrink:0;min-width:52px}
.rebirth-icon{font-size:16px;line-height:1}
.rebirth-lbl{font-family:'Cinzel',serif;font-size:7px;color:var(--dim);letter-spacing:1px;text-align:center}
.rebirth-status{font-family:'Cinzel',serif;font-size:9px;letter-spacing:1px;font-weight:700}
.reb-on{color:var(--green-l)}.reb-off{color:var(--dim)}
.log-col{flex:1;overflow-y:auto;max-height:68px;padding:5px 12px}
.le{font-size:11px;padding:2px 0;line-height:1.6;display:flex;align-items:baseline;gap:5px;
  border-bottom:1px solid rgba(255,255,255,.025)}
.le-dot{font-size:9px;flex-shrink:0;opacity:.5}
.limp{color:var(--gold)}.limp .le-dot{opacity:1;color:var(--gold)}
.lact{color:rgba(228,221,208,.65)}
.lelim{color:var(--red-l)}.lelim .le-dot{color:var(--red-l);opacity:1}

/* My area (bottom fixed) */
.my-area{flex-shrink:0;
  background:linear-gradient(180deg,rgba(28,28,48,.95),rgba(10,10,20,.98));
  border-top:1px solid rgba(201,168,76,.25);padding:12px 16px 8px;
  box-shadow:0 -6px 28px rgba(0,0,0,.6)}
.my-header{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.my-name{font-family:'Cinzel',serif;font-size:12px;color:var(--gold);letter-spacing:3px;flex:1}
.my-badges{display:flex;gap:4px}
.my-hand{display:flex;gap:12px;justify-content:center;align-items:flex-end;
  min-height:calc(var(--ch) + 12px);padding-bottom:4px}

/* Action panel */
.apl{flex-shrink:0;background:var(--panel);border-top:1px solid var(--border2);
  padding:9px 16px 12px}
.aplt{font-family:'Cinzel',serif;color:var(--dim);font-size:9px;letter-spacing:3px;
  text-transform:uppercase;margin-bottom:7px}
.abtns{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.ab{background:var(--panel2);border:1px solid var(--border2);color:var(--text);padding:10px 18px;
  font-family:'Noto Serif JP',serif;font-size:13px;cursor:pointer;border-radius:7px;transition:all .22s}
.ab:hover:not(:disabled){border-color:var(--gold);color:var(--gold);background:rgba(201,168,76,.06)}
.ab:disabled{opacity:.3;cursor:not-allowed}
.ab.cf{background:linear-gradient(135deg,rgba(201,168,76,.2),rgba(138,104,32,.2));
  border-color:var(--gold-d);color:var(--gold);font-weight:600}
.ab.cf:hover:not(:disabled){background:linear-gradient(135deg,rgba(201,168,76,.3),rgba(138,104,32,.3));
  box-shadow:0 0 18px rgba(201,168,76,.25)}
.cdsc{background:rgba(0,0,0,.5);border:1px solid rgba(201,168,76,.15);border-left:2px solid var(--gold-d);
  border-radius:6px;padding:8px 12px;font-size:11px;color:var(--dim);line-height:1.7;
  margin-top:7px;display:none}
.cdsc.vis{display:block}
.wmsg{background:rgba(52,152,219,.06);border:1px solid rgba(52,152,219,.15);border-radius:7px;
  padding:10px 18px;font-family:'Cinzel',serif;font-size:10px;color:var(--blue-l);letter-spacing:2px;
  display:flex;align-items:center;gap:10px}
.wmsg-dot{width:6px;height:6px;border-radius:50%;background:var(--blue-l);flex-shrink:0;
  animation:blink 1.2s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.15}}

/* Cards */
.hc{width:var(--cw);height:var(--ch);border-radius:8px;border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;
  flex-shrink:0;cursor:default;transition:all .25s cubic-bezier(.34,1.5,.64,1)}
.hc.back{background:linear-gradient(145deg,#131328,#1c1c38);
  background-image:repeating-linear-gradient(45deg,transparent,transparent 5px,rgba(201,168,76,.025) 5px,rgba(201,168,76,.025) 6px)}
.hc.sp{cursor:pointer;border-color:rgba(201,168,76,.38)}
.hc.sp:hover{border-color:var(--gold);transform:translateY(-10px) scale(1.05);
  box-shadow:0 18px 30px rgba(0,0,0,.65),0 0 22px rgba(201,168,76,.18)}
.hc.pk{border-color:var(--gold)!important;
  transform:translateY(-16px) scale(1.08)!important;
  box-shadow:0 0 0 2px rgba(201,168,76,.5),0 22px 36px rgba(0,0,0,.7),0 0 32px rgba(201,168,76,.3)!important}
.mc{width:38px;height:55px;border-radius:5px;border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden;transition:all .2s}
.mc:hover{transform:scale(1.12);z-index:2}
.ci{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;
  justify-content:center;padding:5px;gap:2px}
.cr{font-family:'Cinzel Decorative',cursive;font-size:19px;font-weight:700;line-height:1}
.cn{font-size:10px;font-family:'Noto Serif JP',serif;font-weight:700;text-align:center;line-height:1.2}
.ce{font-size:7px;font-family:'Noto Serif JP',serif;opacity:.6;text-align:center;letter-spacing:.5px}
.mc .cr{font-size:10px}.mc .cn{font-size:7px}.mc .ce{display:none}
.ddot{position:absolute;top:5px;right:5px;width:7px;height:7px;border-radius:50%;
  background:var(--gold);box-shadow:0 0 8px var(--gold),0 0 16px rgba(201,168,76,.4);
  animation:pdot .8s ease-in-out infinite}
@keyframes pdot{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.5);opacity:.7}}
.c10{background:linear-gradient(145deg,#180d2e,#2a1560);border-color:#7050c0!important;color:#c8b0f8}
.c9{background:linear-gradient(145deg,#1e0808,#500e0e);border-color:#a01818!important;color:#f09090}
.c8{background:linear-gradient(145deg,#061c2e,#0c3550);border-color:#1878a8!important;color:#70d0f0}
.c7{background:linear-gradient(145deg,#181600,#383000);border-color:#907800!important;color:#e8c800}
.c6{background:linear-gradient(145deg,#1c0800,#401800);border-color:#903000!important;color:#f07830}
.c5{background:linear-gradient(145deg,#0c0c0c,#222222);border-color:#555!important;color:#aaa}
.c4{background:linear-gradient(145deg,#061608,#0e3820);border-color:#187840!important;color:#60e080}
.c3{background:linear-gradient(145deg,#120820,#281042);border-color:#6020a0!important;color:#b870e8}
.c2{background:linear-gradient(145deg,#060e20,#0e2040);border-color:#204090!important;color:#6090e0}
.c1{background:linear-gradient(145deg,#0e0e10,#181828);border-color:#404060!important;color:#8090b8}

/* Badges */
.badge{font-size:8px;padding:2px 8px;border-radius:10px;letter-spacing:1px;
  font-family:'Cinzel',serif;text-transform:uppercase;white-space:nowrap}
.bt{background:rgba(201,168,76,.2);color:var(--gold);border:1px solid rgba(201,168,76,.4)}
.be{background:rgba(192,57,43,.2);color:var(--red-l);border:1px solid rgba(192,57,43,.4)}
.bp{background:rgba(41,128,185,.2);color:var(--blue-l);border:1px solid rgba(41,128,185,.4)}
.bs{background:rgba(125,60,152,.2);color:#c39bd3;border:1px solid rgba(125,60,152,.4)}
.bm{background:rgba(201,168,76,.1);color:var(--gold-l);border:1px solid rgba(201,168,76,.25)}
/* modal */
.mov{position:fixed;inset:0;background:rgba(0,0,0,.88);display:none;
  align-items:center;justify-content:center;z-index:1000;backdrop-filter:blur(4px)}
.mov.on{display:flex}
.mbox{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:24px 24px 20px;
  max-width:430px;width:92%;position:relative}
.mbox::before{content:'';position:absolute;top:0;left:12px;right:12px;height:1px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent)}
.mt{font-family:'Cinzel',serif;color:var(--gold);font-size:14px;letter-spacing:3px;margin-bottom:10px;text-align:center}
.mtx{font-size:11px;color:var(--dim);margin-bottom:14px;text-align:center;line-height:1.8;white-space:pre-line}
.mbd{width:100%}
.mtgts{display:flex;gap:7px;flex-wrap:wrap;justify-content:center;margin-bottom:14px}
.tg{background:var(--panel2);border:1px solid var(--border);color:var(--text);padding:9px 16px;
  font-family:'Noto Serif JP',serif;font-size:12px;cursor:pointer;border-radius:4px;min-width:86px;transition:all .2s}
.tg:hover{border-color:var(--gold);color:var(--gold);background:rgba(201,168,76,.08)}
.mch{display:flex;gap:9px;justify-content:center;flex-wrap:wrap;margin-bottom:14px}
.mcc{cursor:pointer;border-radius:6px;border:2px solid transparent!important;
  width:var(--cw);height:var(--ch);transition:all .2s}

/* toast */

  background:var(--panel);border:1px solid var(--gold-d);color:var(--gold);
  padding:8px 19px;border-radius:4px;font-family:'Cinzel',serif;font-size:10px;letter-spacing:2px;
  z-index:2000;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap;max-width:90vw;text-align:center}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.err{border-color:var(--red);color:var(--red-l)}
/* あなたのターン通知 */

<script type="module">
import { initializeApp }  from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getDatabase, ref, set, get, onValue, remove }
                          from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";
import { getAuth, signInAnonymously }
                          from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

/* ═══════════════════════════════════════
   Firebase設定
═══════════════════════════════════════ */
const FC = {
  apiKey:"AIzaSyA6Dk_MvoVYmQ7zcoRu8Stq36zi3APTods",
  authDomain:"xeno-st.firebaseapp.com",
  databaseURL:"https://xeno-st-default-rtdb.firebaseio.com",
  projectId:"xeno-st",
  storageBucket:"xeno-st.firebasestorage.app",
  messagingSenderId:"1025681806500",
  appId:"1:1025681806500:web:8521ed8c04aaae50954231",
  measurementId:"G-94XZFB62WE"
};

/* ═══════════════════════════════════════
   DB ラッパー
   ゲーム状態は JSON.stringify して1フィールドに保存
   → Firebaseの配列→オブジェクト変換問題を完全回避
═══════════════════════════════════════ */
let db, auth, myUid;

// ゲーム状態をJSONシリアライズして保存
const saveGS = (roomCode, gs) =>
  set(ref(db, `rooms/${roomCode}/gsJson`), JSON.stringify(gs));

// ルーム全体をオブジェクトで保存（ロビー情報）
const saveRoom = (roomCode, data) =>
  set(ref(db, `rooms/${roomCode}`), data);

const getRoom = (roomCode) =>
  get(ref(db, `rooms/${roomCode}`));

const setField = (path, val) =>
  set(ref(db, path), val);

const listenRoom = (roomCode, cb) =>
  onValue(ref(db, `rooms/${roomCode}`), cb);

/* ═══════════════════════════════════════
   クライアント状態
═══════════════════════════════════════ */
let myPid = null, myName = '', roomCode = '', isHost = false, localReady = false;
let unsubRoom = null, lastGS = null, pickedIdx = null, logLen = 0;
let processing = false, lastSeq = -1;

/* ═══════════════════════════════════════
   カードデータ
═══════════════════════════════════════ */
const CD = {
  10:{name:'英雄', eff:'潜伏・転生', cnt:1, desc:'場に出せない。皇帝以外で脱落→転生札で復活。'},
  9: {name:'皇帝', eff:'公開処刑',   cnt:1, desc:'相手に1枚引かせ手札2枚公開、1枚を指定して捨てさせる。英雄→転生不可。'},
  8: {name:'精霊', eff:'交換',       cnt:2, desc:'相手の手札と自分の手札を交換する。'},
  7: {name:'賢者', eff:'選択',       cnt:2, desc:'次の手番で山札から3枚引き1枚を選ぶ。残り2枚は山札へ戻す。'},
  6: {name:'貴族', eff:'対決',       cnt:2, desc:'相手と手札を見せ合い数字の小さい方が脱落。同数は相打ち。'},
  5: {name:'死神', eff:'疫病',       cnt:2, desc:'相手に1枚引かせシャッフル後に盲目で1枚捨てさせる。'},
  4: {name:'乙女', eff:'守護',       cnt:2, desc:'次の自分の手番まで自分への効果を無効にする。'},
  3: {name:'占師', eff:'透視',       cnt:2, desc:'相手の手札を自分だけが確認できる。'},
  2: {name:'兵士', eff:'捜査',       cnt:2, desc:'相手の手札ランクを言い当てると相手が脱落する。'},
  1: {name:'少年', eff:'革命',       cnt:2, desc:'1枚目は効果なし。2枚目で「公開処刑」発動（英雄は転生可）。'},
};

/* ═══════════════════════════════════════
   Firebase 初期化
═══════════════════════════════════════ */
async function init() {
  try {
    const app = initializeApp(FC);
    db   = getDatabase(app);
    auth = getAuth(app);
    const cred = await signInAnonymously(auth);
    myUid = cred.user.uid;
    console.log('Firebase OK uid:', myUid);
    setConnBadge(true);
  } catch(e) {
    console.error('Firebase init error:', e);
    setConnBadge(false, e.message);
  }
}

function setConnBadge(ok, msg) {
  const el = q('conn-status');
  el.className = 'cbadge ' + (ok ? 'cok' : 'cerr');
  el.textContent = ok ? '接続済み' : '接続エラー（クリックで再試行）';
  el.style.cursor = ok ? 'default' : 'pointer';
  el.onclick = ok ? null : () => init();
  if (!ok && msg) toast('接続エラー: ' + msg.slice(0, 60), true);
}

/* ═══════════════════════════════════════
   ルーム管理
═══════════════════════════════════════ */
function genCode() {
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  return Array.from({length:6}, () => chars[Math.floor(Math.random()*chars.length)]).join('');
}

async function createRoom() {
  try {
    if (!myUid) { toast('Firebase接続中。少し待ってから再試行してください', true); return; }
    const name = q('host-name').value.trim() || 'ホスト';
    myName = name; isHost = true; myPid = 0;
    roomCode = genCode();
    toast('部屋を作成中...');
    const roomData = {
      code: roomCode,
      hostUid: myUid,
      status: 'lobby',
      players: [{ uid: myUid, name, ready: false, pid: 0 }],
      gsJson: null,
      createdAt: Date.now()
    };
    await saveRoom(roomCode, roomData);
    enterLobby();
  } catch(e) {
    console.error('createRoom:', e);
    toast('エラー: ' + e.message.slice(0, 60), true);
  }
}

async function joinRoom() {
  try {
    if (!myUid) { toast('Firebase接続中。少し待ってから再試行してください', true); return; }
    const name = q('join-name').value.trim() || 'ゲスト';
    const code = q('join-code').value.trim().toUpperCase();
    if (code.length < 4) { toast('ルームコードを入力してください', true); return; }
    toast('参加中...');
    const snap = await getRoom(code);
    if (!snap.exists()) { toast('部屋が見つかりません', true); return; }
    const room = snap.val();
    if (room.status !== 'lobby') { toast('ゲームはすでに始まっています', true); return; }
    const players = room.players ? Object.values(room.players) : [];
    if (players.length >= 4) { toast('部屋が満員です', true); return; }
    myName = name; isHost = false; roomCode = code;
    myPid = players.length;
    players.push({ uid: myUid, name, ready: false, pid: myPid });
    await setField(`rooms/${code}/players`, players);
    enterLobby();
  } catch(e) {
    console.error('joinRoom:', e);
    toast('エラー: ' + e.message.slice(0, 60), true);
  }
}

function enterLobby() {
  q('code-disp').textContent = roomCode;
  showScreen('lobby-screen');
  if (unsubRoom) unsubRoom();
  unsubRoom = listenRoom(roomCode, snap => {
    if (!snap.exists()) { backToTitle(); return; }
    const room = snap.val();
    if ((room.status === 'playing' || room.status === 'ended') && room.gsJson) {
      if (!q('game-screen').classList.contains('active')) {
        logLen = 0;
        showScreen('game-screen');
      }
      // gsJson は文字列 → JSON.parse で完全な配列構造を復元
      const gs = JSON.parse(room.gsJson);
      onGsReceived(gs);
    } else {
      renderLobby(room);
    }
  });
}

function renderLobby(room) {
  const players = room.players
    ? (Array.isArray(room.players) ? room.players : Object.values(room.players))
    : [];
  // 自分がプレイヤーリストに存在しなければタイトルへ（kickされた場合など）
  if (players.length > 0 && !players.find(p => p.uid === myUid)) {
    backToTitle(); return;
  }
  const stats = room.stats || {};
  q('plist').innerHTML = players.map((p, i) => {
    const me = p.uid === myUid, host = i === 0, rdy = !!p.ready;
    const st = stats[p.uid] || { wins: 0, draws: 0, losses: 0 };
    const total = (st.wins||0) + (st.draws||0) + (st.losses||0);
    const statsHTML = total > 0
      ? `<div class="stats-row">
           <span class="stat-pill stat-w">${st.wins||0}勝</span>
           <span class="stat-pill stat-d">${st.draws||0}分</span>
           <span class="stat-pill stat-l">${st.losses||0}敗</span>
         </div>`
      : '';
    return `<div class="pr ${rdy ? 'rdy' : ''}">
      <div class="pdot"></div>
      <div class="pnm">${p.name}${me ? ' (あなた)' : ''}</div>
      ${host ? '<span class="pbg bhost">HOST</span>' : ''}
      <span class="pbg ${rdy ? 'brdy' : 'bwait'}">${rdy ? '準備完了' : '待機中'}</span>
      ${statsHTML}
    </div>`;
  }).join('');

  const rb = q('ready-btn'), sb = q('start-btn');
  if (isHost) {
    rb.style.display = 'none';
    sb.style.display = '';
    const nonHost = players.slice(1);
    sb.disabled = !(nonHost.length > 0 && nonHost.every(p => p.ready) && players.length >= 2);
  } else {
    rb.style.display = '';
    sb.style.display = 'none';
    rb.textContent = localReady ? '準備中止' : '準備完了';
    rb.className = `btn ${localReady ? 'btn-g' : 'btn-o'}`;
  }
}

async function toggleReady() {
  localReady = !localReady;
  await setField(`rooms/${roomCode}/players/${myPid}/ready`, localReady);
}

async function startGame() {
  try {
    const snap = await getRoom(roomCode);
    const room = snap.val();
    const players = Array.isArray(room.players)
      ? room.players
      : Object.values(room.players);
    const gs = buildInitialGS(players);
    // statusとgsJsonを同時に書き込み
    await setField(`rooms/${roomCode}/status`, 'playing');
    await saveGS(roomCode, gs);
  } catch(e) {
    console.error('startGame:', e);
    toast('エラー: ' + e.message.slice(0, 60), true);
  }
}

/* ═══════════════════════════════════════
   ゲーム状態構築
═══════════════════════════════════════ */
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function buildDeck() {
  const deck = [];
  for (const r in CD) {
    const rank = +r;
    for (let i = 0; i < CD[rank].cnt; i++) deck.push({ rank, id: deck.length });
  }
  return shuffle(deck);
}

function buildInitialGS(roomPlayers) {
  const deck = buildDeck();
  const players = roomPlayers.map((rp, i) => ({
    id: i, uid: rp.uid, name: rp.name,
    hand: [], discards: [],
    eliminated: false, protected: false, sageMode: false
  }));
  for (const p of players) p.hand.push(deck.shift());
  const rebirthCard = deck.shift();
  return {
    players, deck, rebirthCard,
    rebirthUsed: false,
    currentTurn: Math.floor(Math.random() * players.length),
    phase: 'draw',
    drawnId: null,
    boyPlayed: false,
    log: [],
    gameOver: false,
    winners: [],
    seq: 0
  };
}

/* ═══════════════════════════════════════
   リアルタイム受信ハンドラ
   JSON.parse済みの gs を受け取る（型は完全に保持）
═══════════════════════════════════════ */
function onGsReceived(gs) {
  lastGS = gs;

  if (gs.gameOver) {
    renderGame(gs);
    showResult(gs);
    return;
  }

  const cp      = gs.players[gs.currentTurn];
  const isMyTurn = cp && cp.uid === myUid && !cp.eliminated;

  // ── カード公開フェーズ：効果を受ける側に手札を見せる ──
  if (gs.phase === 'reveal-cards' && gs.revealInfo) {
    const ri = gs.revealInfo;
    const iAmActor  = gs.players[gs.currentTurn]?.uid === myUid;
    const iAmTarget = ri.targetUid === myUid;
    // 受ける側（ターゲット）だけに「見るだけ」モーダルを表示
    if (iAmTarget && ri.revealSeq !== _lastRevealSeq) {
      _lastRevealSeq = ri.revealSeq;
      renderGame(gs);
      showRevealModal(ri);
    } else {
      renderGame(gs);
    }
    return;
  }
  // reveal-cards から別フェーズに移行したとき、revealモーダルが開いていれば閉じる
  if (_revealModalOpen && gs.phase !== 'reveal-cards') {
    _revealModalOpen = false;
    closeModal();
  }

  // ── カード通知フェーズ：自分以外のプレイヤーに通知を表示 ──
  if (gs.phase === 'card-announce' && gs.lastPlayedCard) {
    const lp = gs.lastPlayedCard;
    const nseq = lp.notifySeq || 0;
    // 自分が出したカードは既にshowCardAnnounceAsyncで表示済み → スキップ
    const iAmActor = gs.players[gs.currentTurn]?.uid === myUid;
    if (!iAmActor && nseq !== _lastCardAnnounceSeq) {
      _lastCardAnnounceSeq = nseq;
      renderGame(gs);
      showCardAnnounceAsync(lp.playerName, lp, lp.customMsg || null).catch(() => {});
    } else {
      renderGame(gs);
    }
    return;
  }

  // ── drawフェーズ：ターン通知を表示してからドロー ──
  if (gs.phase === 'draw' && isMyTurn && !processing && gs.seq !== lastSeq) {
    lastSeq = gs.seq;
    processing = true;
    renderGame(gs); // まず画面更新
    showTurnAnnounceAsync()
      .then(() => execDraw(deepCopy(gs)))
      .catch(e => console.error('execDraw error:', e))
      .finally(() => { processing = false; });
    return;
  }

  renderGame(gs);
}

/* ═══════════════════════════════════════
   Firebase書き込み（JSON文字列として保存）
═══════════════════════════════════════ */
async function pushGS(gs) {
  gs.seq = (gs.seq || 0) + 1;
  await saveGS(roomCode, gs);
}

/* ═══════════════════════════════════════
   ターンエンジン
═══════════════════════════════════════ */
async function execDraw(gs) {
  const p = gs.players[gs.currentTurn];

  // 賢者モード
  if (p.sageMode) {
    p.sageMode = false;
    const avail = Math.min(3, gs.deck.length);
    if (avail === 0) { await endGame(gs, 'deck'); return; }
    const drawn = gs.deck.splice(0, avail);
    addLog(gs, `${p.name} は賢者の効果で${avail}枚引きます。`, 'act');
    gs.phase = 'choose';
    await pushGS(gs);
    renderGame(gs);
    showSagePick(gs, drawn);
    return;
  }

  // 通常ドロー
  if (gs.deck.length === 0) { await endGame(gs, 'deck'); return; }
  const card = gs.deck.shift();
  gs.drawnId = card.id;
  p.hand.push(card);
  gs.phase = 'choose';
  addLog(gs, `${p.name} が山札からカードを引きました。`, 'act');
  await pushGS(gs);
  renderGame(gs);
}

async function advanceTurn(gs) {
  let next = (gs.currentTurn + 1) % gs.players.length;
  let tries = 0;
  while (gs.players[next].eliminated && tries < gs.players.length) {
    next = (next + 1) % gs.players.length;
    tries++;
  }
  if (tries >= gs.players.length) { await endGame(gs, 'all'); return; }
  gs.players[next].protected = false;
  gs.currentTurn = next;
  gs.phase = 'draw';
  gs.drawnId = null;
  await pushGS(gs);
}

async function endTurn(gs) {
  if (gs.deck.length === 0) { await endGame(gs, 'deck'); return; }
  await advanceTurn(gs);
}

async function playCard(handIndex) {
  if (processing) return;
  const gs = deepCopy(lastGS);
  const actor = gs.players[gs.currentTurn];
  const card = actor.hand[handIndex];
  if (card.rank === 10) { toast('英雄は場に出せません', true); return; }
  actor.hand.splice(handIndex, 1);
  actor.discards.push(card);
  gs.drawnId = null;
  pickedIdx = null;
  q('cdsc').classList.remove('vis');
  addLog(gs, `${actor.name} が「${card.rank} ${CD[card.rank].name}」を出しました。`, 'act');
  // gsにカード情報をのせてFirebase経由で全員に通知
  gs.lastPlayedCard = { rank: card.rank, id: card.id, playerName: actor.name, customMsg: null, notifySeq: (gs.seq || 0) + 1 };
  gs.phase = 'card-announce'; // 通知中フェーズ
  await pushGS(gs);
  // 自分は通知を表示してから効果を実行
  await showCardAnnounceAsync(actor.name, card);
  gs.phase = 'effect-pending';
  await resolveEffect(gs, card, actor);
}

/* ═══════════════════════════════════════
   カード効果
═══════════════════════════════════════ */
async function resolveEffect(gs, card, actor) {
  switch (card.rank) {
    case 9: await fx皇帝(gs, actor); break;
    case 8: await fx精霊(gs, actor); break;
    case 7: fx賢者(gs, actor); await endTurn(gs); break;
    case 6: await fx貴族(gs, actor); break;
    case 5: await fx死神(gs, actor); break;
    case 4: fx乙女(gs, actor); await endTurn(gs); break;
    case 3: await fx占師(gs, actor); break;
    case 2: await fx兵士(gs, actor); break;
    case 1: await fx少年(gs, actor); break;
    default: await endTurn(gs);
  }
}

async function fx皇帝(gs, actor, fromBoy = false) {
  const targets = alivePlayers(gs).filter(p => p.id !== actor.id && !p.protected);
  if (!targets.length) { addLog(gs, '対象なし', 'act'); await endTurn(gs); return; }
  gs.phase = 'effect-pending';
  await pushGS(gs); renderGame(gs);
  pickTarget('皇帝 - 公開処刑', '相手を指名してください', targets, async tgt => {
    await drawAndRevealThenPick(gs, actor, tgt, '公開処刑', `皇帝 - ${tgt.name} の手札`, async ci => {
      const disc = tgt.hand.splice(ci, 1)[0];
      tgt.discards.push(disc);
      addLog(gs, `${actor.name} が ${tgt.name} の「${disc.rank} ${CD[disc.rank].name}」を捨てさせました。`, 'act');
      const empMsg = `皇帝の効果：${tgt.name} の「${disc.rank} ${CD[disc.rank].name}」が捨てられました`;
      gs.lastPlayedCard = { rank: disc.rank, id: disc.id, playerName: '', customMsg: empMsg, notifySeq: (gs.seq || 0) + 1 };
      gs.phase = 'card-announce';
      await pushGS(gs);
      await showCardAnnounceAsync('', disc, empMsg);
      gs.phase = 'effect-pending';
      if (disc.rank === 10) {
        addLog(gs, '英雄が皇帝に処刑！転生不可。', 'elim');
        eliminate(gs, tgt, false);
      } else if (!tgt.hand.length) eliminate(gs, tgt, false);
      if (!checkWin(gs)) await endTurn(gs);
    });
  });
}

// 全プレイヤーの捨て札にある少年（rank=1）の合計枚数を返す
// 自分が今出した少年はすでに捨て札に加えられているのでそのままカウント
function countBoyInDiscards(gs) {
  return gs.players.reduce((sum, p) => {
    return sum + p.discards.filter(card => card.rank === 1).length;
  }, 0);
}

async function fx少年(gs, actor) {
  // 捨て札の少年が1枚（今出したのが最初）なら効果なし
  // 2枚以上（誰かが以前出した or 捨てさせられた）なら公開処刑発動
  const boyCount = countBoyInDiscards(gs);
  if (boyCount <= 1) {
    addLog(gs, `少年${boyCount}枚目（場全体）。効果なし（2枚目で公開処刑）。`, 'act');
    await endTurn(gs);
  } else {
    addLog(gs, `少年${boyCount}枚目！公開処刑発動！`, 'imp');
    const targets = alivePlayers(gs).filter(p => p.id !== actor.id && !p.protected);
    if (!targets.length) { addLog(gs, '対象なし', 'act'); await endTurn(gs); return; }
    gs.phase = 'effect-pending';
    await pushGS(gs); renderGame(gs);
    pickTarget('少年(革命) - 公開処刑', '相手を指名してください', targets, async tgt => {
      await drawAndRevealThenPick(gs, actor, tgt, '少年・公開処刑', `少年 - ${tgt.name} の手札（英雄なら転生可）`, async ci => {
        const disc = tgt.hand.splice(ci, 1)[0];
        tgt.discards.push(disc);
        addLog(gs, `${actor.name} が ${tgt.name} の「${disc.rank} ${CD[disc.rank].name}」を捨てさせました（少年）。`, 'act');
        const boyDiscMsg = `少年の効果：${tgt.name} の「${disc.rank} ${CD[disc.rank].name}」が捨てられました`;
        gs.lastPlayedCard = { rank: disc.rank, id: disc.id, playerName: '', customMsg: boyDiscMsg, notifySeq: (gs.seq || 0) + 1 };
        gs.phase = 'card-announce';
        await pushGS(gs);
        await showCardAnnounceAsync('', disc, boyDiscMsg);
        gs.phase = 'effect-pending';
        if (disc.rank === 10) { addLog(gs, '英雄が少年で脱落→転生！', 'elim'); elimRebirth(gs, tgt); }
        else if (!tgt.hand.length) eliminate(gs, tgt, false);
        if (!checkWin(gs)) await endTurn(gs);
      });
    });

}

function showSagePick(gs, drawn) {
  let sel = null;
  showModal('賢者 - 選択',
    `${gs.players[gs.currentTurn].name} が引いた${drawn.length}枚から1枚選んでください`,
    `<div class="mch">${drawn.map((c, i) => `<div class="mcc c${c.rank}" id="_sp${i}">${cardInner(c)}</div>`).join('')}</div>
     <div class="mbtns"><button class="btn btn-o btn-sm" id="_spok" disabled>選択</button></div>`
  );
  drawn.forEach((_, i) => {
    q(`_sp${i}`).addEventListener('click', () => {
      document.querySelectorAll('.mcc').forEach(e => e.classList.remove('on'));
      q(`_sp${i}`).classList.add('on');
      sel = i;
      q('_spok').disabled = false;
    });
  });
  q('_spok').addEventListener('click', async () => {
    if (sel === null) return;
    const chosen = drawn[sel];
    const rest   = drawn.filter((_, i) => i !== sel);
    const actor  = gs.players[gs.currentTurn];
    actor.hand.push(chosen);
    gs.deck.push(...rest);
    gs.deck = shuffle(gs.deck);
    gs.drawnId = chosen.id;
    gs.phase = 'choose';
    addLog(gs, `${actor.name} が「${chosen.rank} ${CD[chosen.rank].name}」を選びました。`, 'act');
    closeModal();
    await pushGS(gs);
    renderGame(gs);
  }, { once: true });
}

/* ═══════════════════════════════════════
   ゲームヘルパー
═══════════════════════════════════════ */
function alivePlayers(gs) { return gs.players.filter(p => !p.eliminated); }
function deepCopy(gs)     { return JSON.parse(JSON.stringify(gs)); }

function eliminate(gs, p, _rebirth) {
  if (p.eliminated) return;
  p.eliminated = true;
  const cards = p.hand.map(c => `${c.rank}${CD[c.rank].name}`).join(',');
  if (cards) addLog(gs, `${p.name} 脱落。手札: ${cards}`, 'elim');
  p.discards.push(...p.hand);
  p.hand = [];
}

function elimRebirth(gs, p) {
  if (!gs.rebirthUsed && gs.rebirthCard) {
    addLog(gs, `${p.name} の英雄が転生！`, 'imp');
    p.discards.push(...p.hand);
    p.hand = [];
    p.hand.push(gs.rebirthCard);
    gs.rebirthCard = null;
    gs.rebirthUsed = true;
    addLog(gs, `${p.name} が転生札「${p.hand[0].rank} ${CD[p.hand[0].rank].name}」で復帰！`, 'imp');
  } else {
    addLog(gs, `転生札なし。${p.name} 脱落。`, 'elim');
    eliminate(gs, p, false);
  }
}

function checkWin(gs) {
  const alive = alivePlayers(gs);
  if (alive.length <= 1) {
    endGame(gs, alive.length === 1 ? 'survivor' : 'all');
    return true;
  }
  return false;
}

async function endGame(gs, reason) {
  gs.gameOver = true;
  const alive = alivePlayers(gs);
  if (reason === 'survivor') {
    gs.winners = alive.map(p => p.id);
  } else if (reason === 'deck') {
    const mx = Math.max(...alive.map(p => p.hand[0]?.rank ?? 0));
    gs.winners = alive.filter(p => (p.hand[0]?.rank ?? 0) === mx).map(p => p.id);
  } else {
    gs.winners = [];
  }
  const wn = gs.winners.map(id => gs.players[id].name);
  addLog(gs, wn.length === 1 ? `${wn[0]} の勝利！` : wn.length > 1 ? `${wn.join('と')} が引き分け` : '引き分け', 'imp');
  await setField(`rooms/${roomCode}/status`, 'ended');
  await saveGS(roomCode, gs);
  // 勝敗記録を Firebase に書き込む
  await saveStats(gs);
}

async function saveStats(gs) {
  try {
    const snap = await getRoom(roomCode);
    if (!snap.exists()) return;
    const room = snap.val();
    const prevStats = room.stats || {};
    const newStats = { ...prevStats };
    for (const p of gs.players) {
      const uid = p.uid;
      const prev = newStats[uid] || { wins: 0, draws: 0, losses: 0, name: p.name };
      const isWinner = gs.winners.includes(p.id);
      const isDraw   = gs.winners.length !== 1;
      if (isDraw) {
        newStats[uid] = { ...prev, name: p.name, draws: (prev.draws || 0) + 1 };
      } else if (isWinner) {
        newStats[uid] = { ...prev, name: p.name, wins: (prev.wins || 0) + 1 };
      } else {
        newStats[uid] = { ...prev, name: p.name, losses: (prev.losses || 0) + 1 };
      }
    }
    await setField(`rooms/${roomCode}/stats`, newStats);
  } catch(e) { console.error('saveStats error:', e); }
}

function addLog(gs, msg, type = 'act') {
  if (!gs.log) gs.log = [];
  gs.log.push({ msg, type });
  if (gs.log.length > 80) gs.log = gs.log.slice(-80);
}

function renderGame(gs) {
  if (!gs) return;
  lastGS = gs;

  // ヘッダー更新
  const deckLen = gs.deck.length;
  q('g-deck').textContent  = deckLen;
  q('g-deck2').textContent = deckLen;
  const rebStr = gs.rebirthUsed ? 'なし' : 'あり';
  q('g-reb').textContent   = rebStr;
  q('g-reb2').textContent  = rebStr;
  q('g-reb2').className    = 'rebirth-status ' + (gs.rebirthUsed ? 'reb-off' : 'reb-on');

  const cp     = gs.players[gs.currentTurn];
  const myMe   = gs.players.find(p => p.uid === myUid);
  const myTurn = cp && cp.uid === myUid && !cp.eliminated;
  q('g-turn').textContent = cp ? cp.name : '-';
  q('g-sage').innerHTML   = cp && cp.sageMode
    ? `<span class="mytag">賢者モード</span>` : '';

  // 自分エリア更新
  if (myMe) {
    q('my-name-lbl').textContent = myMe.name;
    let myBadges = '';
    if (myMe.id === gs.currentTurn && !myMe.eliminated) myBadges += `<span class="badge bt">手番</span>`;
    if (myMe.eliminated)  myBadges += `<span class="badge be">脱落</span>`;
    if (myMe.protected)   myBadges += `<span class="badge bp">守護</span>`;
    if (myMe.sageMode)    myBadges += `<span class="badge bs">賢者</span>`;
    q('my-badges').innerHTML = myBadges;

    const myHand = q('my-hand');
    myHand.innerHTML = '';
    const canPlay = myTurn && gs.phase === 'choose';
    myMe.hand.forEach((c, i) => {
      const drawn  = gs.drawnId !== null && c.id === gs.drawnId;
      const sel    = pickedIdx === i;
      const noPlay = c.rank === 10;
      const el = document.createElement('div');
      el.className = `hc c${c.rank}${canPlay && !noPlay ? ' sp' : ''}${sel ? ' pk' : ''}`;
      el.dataset.idx = i;
      el.dataset.ok  = canPlay && !noPlay ? 1 : 0;
      el.title = CD[c.rank].desc;
      el.innerHTML = `${drawn ? '<div class="ddot"></div>' : ''}${cardInner(c)}`;
      if (canPlay && !noPlay) {
        el.addEventListener('click', () => {
          pickedIdx = i;
          q('cdsc').className = 'cdsc vis';
          q('cdsc').textContent = `${c.rank} ${CD[c.rank].name}（${CD[c.rank].eff}）: ${CD[c.rank].desc}`;
          renderGame(lastGS);
        });
      }
      myHand.appendChild(el);
    });
    if (!myMe.hand.length && myMe.eliminated) {
      myHand.innerHTML = `<div style="color:var(--dim);font-family:'Cinzel',serif;font-size:11px;letter-spacing:2px">脱落</div>`;
    }

    // 自分の捨て札
    const myDiscArea = q('my-discards');
    if (myDiscArea) {
      myDiscArea.innerHTML = myMe.discards.length
        ? `<span class="my-disc-lbl">捨て札</span>${myMe.discards.map(c =>
            `<div class="mc c${c.rank}" title="${CD[c.rank].name}">${cardInner(c, true)}</div>`
          ).join('')}`
        : '';
    }
  }



  // 相手エリア更新
  const opArea = q('g-opponents');
  opArea.innerHTML = '';
  for (const p of gs.players) {
    if (p.uid === myUid) continue; // 自分はスキップ
    const act = p.id === gs.currentTurn;
    const div = document.createElement('div');
    div.className = `ozone${act ? ' act' : ''}${p.eliminated ? ' ded' : ''}${p.protected ? ' prt' : ''}`;

    let badges = '';
    if (act && !p.eliminated) badges += `<span class="badge bt">手番</span>`;
    if (p.eliminated)         badges += `<span class="badge be">脱落</span>`;
    if (p.protected)          badges += `<span class="badge bp">守護</span>`;
    if (p.sageMode)           badges += `<span class="badge bs">賢者</span>`;

    // 裏向き手札
    const handHTML = !p.eliminated
      ? p.hand.map(() =>
          `<div class="hc back" style="width:60px;height:86px">
            <div class="ci"><div class="cr" style="color:var(--dim);font-size:11px;font-family:'Cinzel',serif">?</div></div>
          </div>`
        ).join('')
      : '';

    // 捨て札
    const discHTML = p.discards.map(c =>
      `<div class="mc c${c.rank}" title="${CD[c.rank].name}">${cardInner(c, true)}</div>`
    ).join('');

    div.innerHTML = `
      <div class="ozh">
        <div class="oz-dot"></div>
        <div class="oz-name">${p.name}</div>
        <div class="oz-badges">${badges}</div>
      </div>
      <div class="oz-hand">${handHTML}</div>
      ${p.discards.length ? `<div class="oz-discards"><span class="oz-disc-lbl">捨て札</span><div style="display:flex;gap:3px;flex-wrap:wrap">${discHTML}</div></div>` : ''}
    `;
    opArea.appendChild(div);
  }

  // アクションパネル
  const atEl = q('aplt'), ab = q('abtns');
  ab.innerHTML = '';
  if (gs.gameOver) { atEl.textContent = 'ゲーム終了'; return; }
  if (!myTurn) {
    atEl.textContent = '他のプレイヤーの手番';
    ab.innerHTML = `<div class="wmsg"><div class="wmsg-dot"></div>${cp ? cp.name : '...'} が操作中...</div>`;
    return;
  }
  if (gs.phase === 'choose') {
    if (pickedIdx !== null) {
      const c = gs.players[gs.currentTurn].hand[pickedIdx];
      atEl.textContent = 'このカードを出しますか？';
      const okBtn = document.createElement('button');
      okBtn.className = 'ab cf';
      okBtn.textContent = `「${c.rank} ${CD[c.rank].name}」を出す`;
      okBtn.addEventListener('click', () => { const i = pickedIdx; pickedIdx = null; playCard(i); });
      const ngBtn = document.createElement('button');
      ngBtn.className = 'ab';
      ngBtn.textContent = 'キャンセル';
      ngBtn.addEventListener('click', () => { pickedIdx = null; q('cdsc').classList.remove('vis'); renderGame(lastGS); });
      ab.append(okBtn, ngBtn);
    } else {
      atEl.textContent = 'カードを選んでください';
      ab.innerHTML = `<span style="font-size:11px;color:var(--dim)">下の手札をクリックして選択してください</span>`;
    }
  } else if (gs.phase === 'effect-pending') {
    atEl.textContent = '効果を解決中...';
  } else {
    atEl.textContent = '処理中...';
  }

  // ログ追記
  if (gs.log && gs.log.length > logLen) {
    const logEl = q('glog');
    for (let i = logLen; i < gs.log.length; i++) {
      const e = gs.log[i];
      const d = document.createElement('div');
      d.className = `le l${e.type}`;
      d.innerHTML = `<span class="le-dot">›</span>${e.msg}`;
      logEl.appendChild(d);
    }
    logEl.scrollTop = logEl.scrollHeight;
    logLen = gs.log.length;
  }
}

function showCardAnnounceAsync(playerName, card, msg = null) {
  return new Promise(resolve => {
    const el    = q('card-announce');
    const label = q('card-announce-label');
    const cCard = q('card-announce-card');
    if (!el) { resolve(); return; }
    label.textContent = msg !== null
      ? msg
      : `${playerName} が「${card.rank} ${CD[card.rank].name}」を出しました`;
    cCard.innerHTML = `<div class="hc c${card.rank}" style="width:100px;height:144px;border-radius:10px;border:1px solid;cursor:default">${cardInner(card)}</div>`;
    el.classList.remove('hide');
    el.classList.add('show');
    setTimeout(() => {
      el.classList.add('hide');
      setTimeout(() => { el.classList.remove('show','hide'); resolve(); }, 400);
    }, 1600);
  });
}

// 共通処理: tgt に1枚引かせ → 両者に手札公開 → 出す側がどちらか選択
// emperor/boy は手札公開あり（公開処刑）
// reaper は手札をシャッフルして盲目選択（公開なし）
async function drawAndRevealThenPick(gs, actor, tgt, effectTitle, pickTitle, pickCb) {
  if (!gs.deck.length) { addLog(gs, '山札なし', 'act'); await endTurn(gs); return; }
  // 1枚引かせる
  tgt.hand.push(gs.deck.shift());
  addLog(gs, `${tgt.name} が山札から引きました（${effectTitle}）。`, 'act');
  // 公開フェーズ：gsにカード情報を載せてFirebase経由で受ける側にも表示
  const revealSeq = (gs.seq || 0) + 1;
  gs.revealInfo = {
    title: `${effectTitle} - ${tgt.name} の手札`,
    desc: `${actor.name} がどちらかを捨てさせます`,
    cards: [...tgt.hand], // 現在の手札（元の手札 + 引いたカード）
    targetUid: tgt.uid,
    actorUid: actor.uid,
    revealSeq,
  };
  gs.phase = 'reveal-cards';
  await pushGS(gs);
  renderGame(gs);
  // 出す側はpickCardで選択
  pickCard(pickTitle, '捨てさせるカードを選んでください。', tgt.hand, pickCb);
}

function pickCard(title, text, cards, cb) {
  let sel = null;
  showModal(title, text,
    `<div class="mch">${cards.map((c, i) =>
      `<div class="mcc c${c.rank}" data-ci="${i}">${cardInner(c)}</div>`
    ).join('')}</div>
     <div class="mbtns"><button class="btn btn-o btn-sm" id="_ccok" disabled>捨てさせる</button></div>`
  );
  q('mbd').querySelectorAll('.mcc').forEach(el => {
    el.addEventListener('click', () => {
      q('mbd').querySelectorAll('.mcc').forEach(e => e.classList.remove('on'));
      el.classList.add('on');

    if (sel === null) return;
    closeModal();
    cb(sel);
  }, { once: true });
}

function toast(msg, err = false) {

  t.className   = `toast on${err ? ' err' : ''}`;
  clearTimeout(window._tt);
  window._tt = setTimeout(() => t.classList.remove('on'), 2800);
}
async function leaveRoomCleanup() {
  // Firebaseのプレイヤーリストから自分を削除してホストに通知
  if (!roomCode || !myUid) return;
  try {
    const snap = await getRoom(roomCode);
    if (!snap.exists()) return;
    const room = snap.val();
    const players = Array.isArray(room.players)
      ? room.players : Object.values(room.players);
    const remaining = players.filter(p => p.uid !== myUid);
    if (remaining.length === 0) {
      // 自分が最後の一人ならルームごと削除
      await setField(`rooms/${roomCode}`, null);
    } else {
      // pid を振り直して保存
      const reIndexed = remaining.map((p, i) => ({ ...p, pid: i }));
      await setField(`rooms/${roomCode}/players`, reIndexed);
      // ホストが抜けた場合は次の人がホストになる
      if (room.hostUid === myUid && reIndexed.length > 0) {
        await setField(`rooms/${roomCode}/hostUid`, reIndexed[0].uid);
      }
    }
  } catch(e) {
    console.error('leaveRoomCleanup error:', e);
  }
}

async function backToTitle() {
  if (unsubRoom) { unsubRoom(); unsubRoom = null; }
  // roomCode をリセットする前に削除処理を完了させる
  if (roomCode) await leaveRoomCleanup();
  logLen = 0; pickedIdx = null; localReady = false;
  processing = false; lastSeq = -1; _lastAnnouncedSeq = -1; _lastRevealSeq = -1; _revealModalOpen = false;
  roomCode = ''; isHost = false; myPid = null;
  showScreen('title-screen');
}

// 同じルームのロビーへ戻る（再戦）
async function backToLobby() {
  try {
    logLen = 0; pickedIdx = null; processing = false;
    lastSeq = -1; _lastAnnouncedSeq = -1; lastGS = null;

    // ルームをlobby状態にリセット（gsJsonクリア、全員ready=false）
    const snap = await getRoom(roomCode);
    if (!snap.exists()) { backToTitle(); return; }
    const room = snap.val();
    const players = Array.isArray(room.players)
      ? room.players : Object.values(room.players);
    // 全員のready状態をリセット
    const resetPlayers = players.map(p => ({ ...p, ready: false }));
    await setField(`rooms/${roomCode}/status`, 'lobby');
    await setField(`rooms/${roomCode}/gsJson`, null);
    await setField(`rooms/${roomCode}/players`, resetPlayers);
    // ホスト判定を維持
    isHost = room.hostUid === myUid;
    localReady = false;
    showScreen('lobby-screen');
    // リスナーは enterLobby で再設定済みなので再購読
    if (unsubRoom) { unsubRoom(); unsubRoom = null; }
    unsubRoom = listenRoom(roomCode, snap2 => {
      if (!snap2.exists()) { backToTitle(); return; }
      const room2 = snap2.val();
      if ((room2.status === 'playing' || room2.status === 'ended') && room2.gsJson) {
        if (!q('game-screen').classList.contains('active')) {
          logLen = 0; showScreen('game-screen');
        }
        onGsReceived(JSON.parse(room2.gsJson));
      } else {
        renderLobby(room2);
      }
    });
  } catch(e) {
    console.error('backToLobby error:', e);
    backToTitle();
  }
}

  q('join-btn')  .addEventListener('click', joinRoom);
  q('ready-btn') .addEventListener('click', toggleReady);
  q('start-btn') .addEventListener('click', startGame);
  q('leave-btn') .addEventListener('click', backToTitle);
  q('back-btn')  .addEventListener('click', backToTitle);
  q('replay-btn').addEventListener('click', backToLobby);
  q('code-disp') .addEventListener('click', () => {
    navigator.clipboard.writeText(roomCode)
      .then(() => toast('コードをコピーしました！'))
      .catch(() => toast(roomCode));
  });
  q('join-code').addEventListener('keydown', e => { if (e.key === 'Enter') joinRoom(); });
});

init();
</script>
</body>
</html>
