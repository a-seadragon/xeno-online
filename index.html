<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XENO Online</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Noto+Serif+JP:wght@300;400;600;700&family=Cinzel:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{
  --gold:#c9a84c;--gold-l:#f0d080;--gold-d:#8a6820;
  --deep:#080810;--panel:#141422;--panel2:#1c1c30;
  --border:#252540;--border2:#2e2e50;
  --text:#e4ddd0;--dim:#6a6480;
  --red:#c0392b;--red-l:#e74c3c;
  --blue:#2471a3;--blue-l:#3498db;
  --green:#1e8449;--green-l:#27ae60;
  --purple:#7d3c98;
  --cw:88px;--ch:126px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--deep);color:var(--text);font-family:'Noto Serif JP',serif;min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse at 30% 20%,rgba(201,168,76,.04),transparent 50%),
             radial-gradient(ellipse at 70% 80%,rgba(100,50,150,.04),transparent 50%)}
.screen{display:none;min-height:100vh;position:relative;z-index:1}
.screen.active{display:flex;flex-direction:column;align-items:center;justify-content:center}
#game-screen.active{justify-content:flex-start}
/* title */
#title-screen{padding:40px 20px}
.logo-wrap{text-align:center;margin-bottom:28px}
.logo-eye{font-family:'Cinzel',serif;font-size:10px;letter-spacing:10px;color:var(--gold);opacity:.6;margin-bottom:10px}
.logo-main{font-family:'Cinzel Decorative',cursive;font-size:clamp(54px,11vw,104px);font-weight:900;letter-spacing:.15em;
  background:linear-gradient(145deg,#8a6820 0%,#c9a84c 30%,#f0d080 55%,#c9a84c 75%,#8a6820 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  animation:sh 4s ease-in-out infinite;filter:drop-shadow(0 0 24px rgba(201,168,76,.25))}
@keyframes sh{0%,100%{filter:drop-shadow(0 0 16px rgba(201,168,76,.2))}50%{filter:drop-shadow(0 0 36px rgba(201,168,76,.5))}}
.logo-sub{font-family:'Cinzel',serif;font-size:12px;letter-spacing:6px;color:var(--gold);opacity:.5;margin-top:8px}
.ob{display:inline-block;background:rgba(201,168,76,.1);border:1px solid var(--gold-d);
  color:var(--gold);font-family:'Cinzel',serif;font-size:9px;letter-spacing:4px;padding:4px 14px;border-radius:2px;margin-top:10px}
.div{width:180px;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:22px auto}
.cbadge{font-family:'Cinzel',serif;font-size:9px;letter-spacing:2px;padding:3px 10px;border-radius:2px;display:inline-block;margin-bottom:16px}
.cok{background:rgba(39,174,96,.1);border:1px solid var(--green);color:var(--green-l)}
.cerr{background:rgba(192,57,43,.1);border:1px solid var(--red);color:var(--red-l)}
.lcards{display:flex;gap:14px;flex-wrap:wrap;justify-content:center;max-width:560px;width:100%}
.lc{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:24px 20px;
  flex:1;min-width:238px;max-width:258px;transition:border-color .2s}
.lc:hover{border-color:var(--border2)}
.lct{font-family:'Cinzel',serif;color:var(--gold);font-size:13px;letter-spacing:3px;margin-bottom:13px;text-align:center}
.inp{width:100%;background:#0a0a14;border:1px solid var(--border);color:var(--text);
  padding:11px 13px;font-family:'Noto Serif JP',serif;font-size:14px;border-radius:5px;outline:none;
  transition:border-color .2s;margin-bottom:10px}
.inp:focus{border-color:var(--gold)}.inp::placeholder{color:var(--dim)}
.cinp{font-family:'Cinzel',serif;font-size:20px;letter-spacing:8px;text-align:center;text-transform:uppercase}
.btn{width:100%;border:none;padding:13px;font-family:'Cinzel',serif;font-size:12px;letter-spacing:3px;
  text-transform:uppercase;cursor:pointer;border-radius:5px;transition:all .2s}
.btn-g{background:linear-gradient(135deg,#c9a84c,#8a6820);color:#080810;font-weight:700}
.btn-g:hover:not(:disabled){background:linear-gradient(135deg,#f0d080,#c9a84c);box-shadow:0 0 26px rgba(201,168,76,.3)}
.btn-o{background:transparent;border:1px solid var(--border2);color:var(--text)}
.btn-o:hover:not(:disabled){border-color:var(--gold);color:var(--gold)}
.btn:disabled{opacity:.35;cursor:not-allowed}
.btn-sm{width:auto;padding:8px 18px;font-size:10px;letter-spacing:2px}
/* lobby */
#lobby-screen{padding:24px 16px;gap:16px}
.cdsp{font-family:'Cinzel Decorative',cursive;font-size:clamp(30px,6vw,50px);color:var(--gold);
  letter-spacing:.2em;text-shadow:0 0 28px rgba(201,168,76,.3);cursor:pointer;transition:all .2s;user-select:none;text-align:center}
.cdsp:hover{text-shadow:0 0 48px rgba(201,168,76,.6)}
.chint{font-size:10px;color:var(--dim);font-family:'Cinzel',serif;letter-spacing:2px;margin-top:4px;text-align:center}
.slbl{font-family:'Cinzel',serif;font-size:10px;color:var(--dim);letter-spacing:4px;text-transform:uppercase;margin-bottom:10px}
.plist{display:flex;flex-direction:column;gap:7px;width:100%;max-width:420px}
.pr{background:var(--panel);border:1px solid var(--border);border-radius:6px;
  padding:10px 15px;display:flex;align-items:center;gap:9px;transition:all .3s}
.pr.rdy{border-color:var(--green);background:rgba(39,174,96,.05)}
.pdot{width:7px;height:7px;border-radius:50%;background:var(--dim);flex-shrink:0;transition:all .3s}
.pr.rdy .pdot{background:var(--green-l);box-shadow:0 0 7px var(--green)}
.pnm{font-family:'Cinzel',serif;font-size:12px;letter-spacing:2px;flex:1}
.pbg{font-size:8px;font-family:'Cinzel',serif;letter-spacing:1px;padding:2px 8px;border-radius:2px}
.bhost{background:rgba(201,168,76,.15);border:1px solid var(--gold-d);color:var(--gold)}
.brdy{background:rgba(39,174,96,.15);border:1px solid var(--green);color:var(--green-l)}
.bwait{background:rgba(106,100,128,.1);border:1px solid var(--border2);color:var(--dim)}
/* 勝率 */
.stats-row{display:flex;gap:5px;align-items:center;margin-left:auto}
.stat-pill{font-family:'Cinzel',serif;font-size:8px;letter-spacing:1px;padding:2px 7px;border-radius:8px;white-space:nowrap}
.stat-w{background:rgba(201,168,76,.15);color:var(--gold);border:1px solid rgba(201,168,76,.3)}
.stat-d{background:rgba(106,100,128,.15);color:var(--dim);border:1px solid var(--border2)}
.stat-l{background:rgba(192,57,43,.12);color:var(--red-l);border:1px solid rgba(192,57,43,.25)}
/* 結果画面の成績 */
.result-stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:16px}
.rstat-card{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:12px 16px;text-align:center;min-width:100px}
.rstat-name{font-family:'Cinzel',serif;font-size:10px;color:var(--dim);letter-spacing:2px;margin-bottom:8px}
.rstat-nums{display:flex;gap:6px;justify-content:center;margin-bottom:4px}
.rstat-rate{font-family:'Cinzel Decorative',cursive;font-size:20px;color:var(--gold)}
.rstat-label{font-family:'Cinzel',serif;font-size:8px;color:var(--dim);letter-spacing:1px}
/* ── GAME SCREEN ─────────────────────────────────────
   Layout: Header / TurnBar / Opponents(scroll) / CenterBar / MyArea(fixed) / ActionPanel
─────────────────────────────────────────────────────*/
#game-screen{flex-direction:column;padding:0;height:100vh;width:100%;align-items:stretch;overflow:hidden}


/* Turn bar */
.tbar{display:flex;align-items:center;justify-content:center;gap:8px;padding:5px 16px;flex-shrink:0;
  background:linear-gradient(90deg,transparent,rgba(201,168,76,.07),transparent);
  border-bottom:1px solid rgba(201,168,76,.1)}
.tbar-lbl{font-family:'Cinzel',serif;font-size:8px;color:var(--dim);letter-spacing:3px;text-transform:uppercase}
.tnm{font-family:'Cinzel',serif;font-size:13px;color:var(--gold);letter-spacing:2px}
.mytag{background:rgba(201,168,76,.15);border:1px solid rgba(201,168,76,.35);color:var(--gold);
  font-family:'Cinzel',serif;font-size:8px;padding:2px 9px;border-radius:10px;letter-spacing:1px;
  animation:pgold 2s ease-in-out infinite}
@keyframes pgold{0%,100%{box-shadow:0 0 0 0 rgba(201,168,76,.3)}60%{box-shadow:0 0 0 5px rgba(201,168,76,0)}}

/* Opponents area (scrollable) */
.opponents-area{flex:1;padding:10px 12px 6px;display:flex;flex-direction:column;gap:8px;
  overflow-y:auto;min-height:0}

/* Opponent zone */
.ozone{background:var(--panel);border:1px solid var(--border);border-radius:10px;
  padding:10px 13px;transition:all .35s;position:relative;overflow:hidden}
.ozone::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.06),transparent);transition:all .35s}
.ozone.act{border-color:rgba(201,168,76,.45);
  box-shadow:0 0 22px rgba(201,168,76,.1),inset 0 0 22px rgba(201,168,76,.03)}
.ozone.act::after{background:linear-gradient(90deg,transparent,var(--gold),transparent)}
.ozone.ded{opacity:.28;border-color:transparent;background:rgba(10,10,20,.5)}
.ozone.prt{border-color:rgba(52,152,219,.4);box-shadow:0 0 16px rgba(52,152,219,.1)}
.ozh{display:flex;align-items:center;gap:7px;margin-bottom:9px}
.oz-dot{width:7px;height:7px;border-radius:50%;background:var(--dim);flex-shrink:0;transition:all .3s}
.ozone.act .oz-dot{background:var(--gold);box-shadow:0 0 7px var(--gold)}
.ozone.ded .oz-dot{background:var(--red)}
.ozone.prt .oz-dot{background:var(--blue-l)}
.oz-name{font-family:'Cinzel',serif;font-size:11px;letter-spacing:2px;flex:1;color:var(--text)}
.oz-badges{display:flex;gap:4px;flex-wrap:wrap}
.oz-hand{display:flex;gap:5px;align-items:center;flex-wrap:wrap}
.oz-discards{display:flex;gap:3px;flex-wrap:wrap;margin-top:7px;padding-top:7px;
  border-top:1px solid rgba(255,255,255,.04)}
.oz-disc-lbl{font-family:'Cinzel',serif;font-size:7px;color:var(--dim);letter-spacing:2px;
  margin-bottom:3px;opacity:.5;display:block}

/* Center bar: deck visual + log */
.center-bar{display:flex;flex-shrink:0;background:#070710;
  border-top:1px solid var(--border);border-bottom:1px solid var(--border)}
.deck-col{display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:7px 14px;border-right:1px solid var(--border);gap:3px;flex-shrink:0}
.deck-vis{position:relative;width:30px;height:44px}
.deck-card{position:absolute;border-radius:4px;border:1px solid;background:linear-gradient(145deg,#12122a,#1a1a38)}
.deck-card:nth-child(1){top:0;left:0;width:28px;height:40px;border-color:var(--border);z-index:3}
.deck-card:nth-child(2){top:-2px;left:2px;width:28px;height:40px;border-color:var(--border2);z-index:2}
.deck-card:nth-child(3){top:-4px;left:4px;width:28px;height:40px;border-color:rgba(37,37,64,.4);z-index:1}
.deck-num{font-family:'Cinzel Decorative',cursive;font-size:18px;color:var(--gold);font-weight:700;line-height:1;text-align:center}
.deck-lbl{font-family:'Cinzel',serif;font-size:7px;color:var(--dim);letter-spacing:2px;text-align:center}
.rebirth-col{display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:7px 14px;border-right:1px solid var(--border);gap:2px;flex-shrink:0;min-width:52px}
.rebirth-icon{font-size:16px;line-height:1}
.rebirth-lbl{font-family:'Cinzel',serif;font-size:7px;color:var(--dim);letter-spacing:1px;text-align:center}
.rebirth-status{font-family:'Cinzel',serif;font-size:9px;letter-spacing:1px;font-weight:700}
.reb-on{color:var(--green-l)}.reb-off{color:var(--dim)}
.log-col{flex:1;overflow-y:auto;max-height:68px;padding:5px 12px}
.le{font-size:11px;padding:2px 0;line-height:1.6;display:flex;align-items:baseline;gap:5px;
  border-bottom:1px solid rgba(255,255,255,.025)}
.le-dot{font-size:9px;flex-shrink:0;opacity:.5}
.limp{color:var(--gold)}.limp .le-dot{opacity:1;color:var(--gold)}
.lact{color:rgba(228,221,208,.65)}
.lelim{color:var(--red-l)}.lelim .le-dot{color:var(--red-l);opacity:1}


/* My area (bottom fixed) */
.my-area{flex-shrink:0;
  background:linear-gradient(180deg,rgba(28,28,48,.95),rgba(10,10,20,.98));
  border-top:1px solid rgba(201,168,76,.25);padding:12px 16px 8px;
  box-shadow:0 -6px 28px rgba(0,0,0,.6)}
.my-header{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.my-name{font-family:'Cinzel',serif;font-size:12px;color:var(--gold);letter-spacing:3px;flex:1}
.my-badges{display:flex;gap:4px}
.my-hand{display:flex;gap:12px;justify-content:center;align-items:flex-end;
  min-height:calc(var(--ch) + 12px);padding-bottom:4px}

/* Action panel */
.apl{flex-shrink:0;background:var(--panel);border-top:1px solid var(--border2);
  padding:9px 16px 12px}
.aplt{font-family:'Cinzel',serif;color:var(--dim);font-size:9px;letter-spacing:3px;
  text-transform:uppercase;margin-bottom:7px}
.abtns{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.ab{background:var(--panel2);border:1px solid var(--border2);color:var(--text);padding:10px 18px;
  font-family:'Noto Serif JP',serif;font-size:13px;cursor:pointer;border-radius:7px;transition:all .22s}
.ab:hover:not(:disabled){border-color:var(--gold);color:var(--gold);background:rgba(201,168,76,.06)}
.ab:disabled{opacity:.3;cursor:not-allowed}
.ab.cf{background:linear-gradient(135deg,rgba(201,168,76,.2),rgba(138,104,32,.2));
  border-color:var(--gold-d);color:var(--gold);font-weight:600}
.ab.cf:hover:not(:disabled){background:linear-gradient(135deg,rgba(201,168,76,.3),rgba(138,104,32,.3));
  box-shadow:0 0 18px rgba(201,168,76,.25)}
.cdsc{background:rgba(0,0,0,.5);border:1px solid rgba(201,168,76,.15);border-left:2px solid var(--gold-d);
  border-radius:6px;padding:8px 12px;font-size:11px;color:var(--dim);line-height:1.7;
  margin-top:7px;display:none}
.cdsc.vis{display:block}
.wmsg{background:rgba(52,152,219,.06);border:1px solid rgba(52,152,219,.15);border-radius:7px;
  padding:10px 18px;font-family:'Cinzel',serif;font-size:10px;color:var(--blue-l);letter-spacing:2px;
  display:flex;align-items:center;gap:10px}
.wmsg-dot{width:6px;height:6px;border-radius:50%;background:var(--blue-l);flex-shrink:0;
  animation:blink 1.2s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.15}}

/* Cards */
.hc{width:var(--cw);height:var(--ch);border-radius:8px;border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;
  flex-shrink:0;cursor:default;transition:all .25s cubic-bezier(.34,1.5,.64,1)}
.hc.back{background:linear-gradient(145deg,#131328,#1c1c38);
  background-image:repeating-linear-gradient(45deg,transparent,transparent 5px,rgba(201,168,76,.025) 5px,rgba(201,168,76,.025) 6px)}
.hc.sp{cursor:pointer;border-color:rgba(201,168,76,.38)}
.hc.sp:hover{border-color:var(--gold);transform:translateY(-10px) scale(1.05);
  box-shadow:0 18px 30px rgba(0,0,0,.65),0 0 22px rgba(201,168,76,.18)}
.hc.pk{border-color:var(--gold)!important;
  transform:translateY(-16px) scale(1.08)!important;
  box-shadow:0 0 0 2px rgba(201,168,76,.5),0 22px 36px rgba(0,0,0,.7),0 0 32px rgba(201,168,76,.3)!important}
.mc{width:38px;height:55px;border-radius:5px;border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden;transition:all .2s}
.mc:hover{transform:scale(1.12);z-index:2}
.ci{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;
  justify-content:center;padding:5px;gap:2px}
.cr{font-family:'Cinzel Decorative',cursive;font-size:19px;font-weight:700;line-height:1}
.cn{font-size:10px;font-family:'Noto Serif JP',serif;font-weight:700;text-align:center;line-height:1.2}
.ce{font-size:7px;font-family:'Noto Serif JP',serif;opacity:.6;text-align:center;letter-spacing:.5px}
.mc .cr{font-size:10px}.mc .cn{font-size:7px}.mc .ce{display:none}
.ddot{position:absolute;top:5px;right:5px;width:7px;height:7px;border-radius:50%;
  background:var(--gold);box-shadow:0 0 8px var(--gold),0 0 16px rgba(201,168,76,.4);
  animation:pdot .8s ease-in-out infinite}
@keyframes pdot{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.5);opacity:.7}}
.c10{background:linear-gradient(145deg,#180d2e,#2a1560);border-color:#7050c0!important;color:#c8b0f8}
.c9{background:linear-gradient(145deg,#1e0808,#500e0e);border-color:#a01818!important;color:#f09090}
.c8{background:linear-gradient(145deg,#061c2e,#0c3550);border-color:#1878a8!important;color:#70d0f0}
.c7{background:linear-gradient(145deg,#181600,#383000);border-color:#907800!important;color:#e8c800}
.c6{background:linear-gradient(145deg,#1c0800,#401800);border-color:#903000!important;color:#f07830}
.c5{background:linear-gradient(145deg,#0c0c0c,#222222);border-color:#555!important;color:#aaa}
.c4{background:linear-gradient(145deg,#061608,#0e3820);border-color:#187840!important;color:#60e080}
.c3{background:linear-gradient(145deg,#120820,#281042);border-color:#6020a0!important;color:#b870e8}
.c2{background:linear-gradient(145deg,#060e20,#0e2040);border-color:#204090!important;color:#6090e0}
.c1{background:linear-gradient(145deg,#0e0e10,#181828);border-color:#404060!important;color:#8090b8}

/* Badges */
.badge{font-size:8px;padding:2px 8px;border-radius:10px;letter-spacing:1px;
  font-family:'Cinzel',serif;text-transform:uppercase;white-space:nowrap}
.bt{background:rgba(201,168,76,.2);color:var(--gold);border:1px solid rgba(201,168,76,.4)}
.be{background:rgba(192,57,43,.2);color:var(--red-l);border:1px solid rgba(192,57,43,.4)}
.bp{background:rgba(41,128,185,.2);color:var(--blue-l);border:1px solid rgba(41,128,185,.4)}
.bs{background:rgba(125,60,152,.2);color:#c39bd3;border:1px solid rgba(125,60,152,.4)}
.bm{background:rgba(201,168,76,.1);color:var(--gold-l);border:1px solid rgba(201,168,76,.25)}
/* modal */
.mov{position:fixed;inset:0;background:rgba(0,0,0,.88);display:none;
  align-items:center;justify-content:center;z-index:1000;backdrop-filter:blur(4px)}
.mov.on{display:flex}
.mbox{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:24px 24px 20px;
  max-width:430px;width:92%;position:relative}
.mbox::before{content:'';position:absolute;top:0;left:12px;right:12px;height:1px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent)}
.mt{font-family:'Cinzel',serif;color:var(--gold);font-size:14px;letter-spacing:3px;margin-bottom:10px;text-align:center}
.mtx{font-size:11px;color:var(--dim);margin-bottom:14px;text-align:center;line-height:1.8;white-space:pre-line}
.mbd{width:100%}
.mtgts{display:flex;gap:7px;flex-wrap:wrap;justify-content:center;margin-bottom:14px}
.tg{background:var(--panel2);border:1px solid var(--border);color:var(--text);padding:9px 16px;
  font-family:'Noto Serif JP',serif;font-size:12px;cursor:pointer;border-radius:4px;min-width:86px;transition:all .2s}
.tg:hover{border-color:var(--gold);color:var(--gold);background:rgba(201,168,76,.08)}
.tg.prot{border-color:rgba(52,152,219,.4);color:var(--blue-l);background:rgba(52,152,219,.06);cursor:pointer;opacity:.8}
.tg.prot:hover{border-color:var(--blue-l);background:rgba(52,152,219,.14)}
.mch{display:flex;gap:9px;justify-content:center;flex-wrap:wrap;margin-bottom:14px}
.mcc{cursor:pointer;border-radius:6px;border:2px solid transparent!important;
  width:var(--cw);height:var(--ch);transition:all .2s}
.mcc:hover,.mcc.on{border-color:var(--gold)!important;transform:translateY(-4px);box-shadow:0 8px 16px rgba(201,168,76,.3)}
.mrsel{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;margin-bottom:13px}
.rb{width:37px;height:37px;border-radius:4px;border:1px solid var(--border);background:var(--panel2);
  cursor:pointer;font-family:'Cinzel',serif;font-size:14px;transition:all .2s;
  display:flex;align-items:center;justify-content:center;color:var(--text)}
.rb:hover,.rb.on{border-color:var(--gold);color:var(--gold);background:rgba(201,168,76,.08)}

<script type="module">
/**
 * ================================================================
 * XENO Online - メインスクリプト
 * ================================================================
 * 概要:
 *   Firebase Realtime Database を使ったリアルタイム対戦カードゲーム。
 *   ゲーム状態は JSON.stringify して "gsJson" フィールドに文字列で保存し、
 *   Firebase の配列→オブジェクト変換問題を完全回避している。
 *
 * アーキテクチャ:
 *   - 手番プレイヤーのクライアントがゲーム処理（ドロー・効果）を実行
 *   - 処理結果を Firebase に書き込むと他プレイヤーのリスナーが発火
 *   - onGsReceived() がすべての状態変化を受け取り UI を更新する
 *
 * フロー:
 *   ① Firebase リスナー発火 → onGsReceived(gs)
 *   ② phase === 'draw' かつ自分のターン → execDraw() でカードを引く
 *   ③ phase === 'choose' → renderGame() でカード選択UIを表示
 *   ④ カードを選択・確定 → playCard() → resolveEffect() で効果処理
 *   ⑤ 効果処理完了 → endTurn() → advanceTurn() → phase='draw' を Firebase に書き込み
 *   ⑥ 次のプレイヤーのリスナーが発火して② に戻る
 * ================================================================
 */

// ── Firebase SDK インポート ──
import { initializeApp }  from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getDatabase, ref, set, get, onValue, push, query, limitToLast, orderByKey }
                          from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";
import { getAuth, signInAnonymously }
                          from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";


// ================================================================
// 効果音エンジン（Web Audio API）
// 概要: 外部ファイル不要でブラウザ内に音を合成して再生する。
// 詳細: AudioContext はユーザー操作（クリック）後に初期化する。
//       それ以前は sfx() を呼んでも無音で無視される。
//       各効果音は oscillator + gainNode の組み合わせで波形を生成し、
//       エンベロープ（attack/decay/release）で音量を制御する。
// ================================================================
let _ac = null; // AudioContext（ユーザー操作後に初期化）

/** AudioContext をユーザー操作時に初期化（ブラウザのAutoplay制限対策） */
function initAudio() {
  if (_ac) return;
  try { _ac = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {}
}

/**
 * 概要: 指定した設定で効果音を再生する汎用関数。
 * @param {Array}  notes  - [{freq, dur, type, vol}] の配列（和音・連音対応）
 * @param {number} delay  - 再生開始までの遅延（秒）
 */
function sfx(notes, delay = 0) {
  if (!_ac) return;
  const now = _ac.currentTime + delay;
  notes.forEach(({ freq, dur = 0.15, type = 'sine', vol = 0.18, start = 0 }) => {
    const osc  = _ac.createOscillator();
    const gain = _ac.createGain();
    osc.connect(gain);
    gain.connect(_ac.destination);
    osc.type      = type;
    osc.frequency.setValueAtTime(freq, now + start);
    gain.gain.setValueAtTime(0, now + start);
    gain.gain.linearRampToValueAtTime(vol, now + start + 0.01);
    gain.gain.exponentialRampToValueAtTime(0.001, now + start + dur);
    osc.start(now + start);
    osc.stop(now + start + dur + 0.05);
  });
}

// ── 効果音プリセット ──

/** カードドロー：シュルっとした紙の音 */
function sfxDraw() {
  sfx([
    { freq:600, dur:0.06, type:'square', vol:0.06 },
    { freq:800, dur:0.08, type:'triangle', vol:0.10, start:0.04 },
    { freq:1000, dur:0.06, type:'sine', vol:0.08, start:0.08 },
  ]);
}

/** カードを出す：コツンとした音 */
function sfxPlay() {
  sfx([
    { freq:300, dur:0.05, type:'square', vol:0.12 },
    { freq:500, dur:0.10, type:'triangle', vol:0.14, start:0.03 },
  ]);
}

/** ターン移行：ポーンという柔らかい通知音 */
function sfxTurn() {
  sfx([
    { freq:440, dur:0.20, type:'sine', vol:0.15 },
    { freq:660, dur:0.20, type:'sine', vol:0.12, start:0.12 },
  ]);
}

/** 守護発動：シールドを張るような低くて硬い音 */
function sfxGuardian() {
  sfx([
    { freq:200, dur:0.30, type:'triangle', vol:0.18 },
    { freq:300, dur:0.25, type:'triangle', vol:0.14, start:0.05 },
    { freq:150, dur:0.40, type:'sine', vol:0.10, start:0.10 },
  ]);
}

/** 捨て札（皇帝・死神・少年）：ドサっと落とすような低音 */
function sfxDiscard() {
  sfx([
    { freq:180, dur:0.12, type:'square', vol:0.14 },
    { freq:130, dur:0.20, type:'triangle', vol:0.16, start:0.08 },
  ]);
}

/** 脱落：ずんっとした重い音 */
function sfxEliminate() {
  sfx([
    { freq:220, dur:0.08, type:'square', vol:0.18 },
    { freq:160, dur:0.15, type:'square', vol:0.14, start:0.06 },
    { freq:110, dur:0.30, type:'triangle', vol:0.12, start:0.14 },
  ]);
}

/** 転生：神秘的な上昇音 */
function sfxRebirth() {
  sfx([
    { freq:330, dur:0.18, type:'sine', vol:0.14 },
    { freq:440, dur:0.18, type:'sine', vol:0.14, start:0.10 },
    { freq:550, dur:0.18, type:'sine', vol:0.14, start:0.20 },
    { freq:660, dur:0.25, type:'sine', vol:0.16, start:0.30 },
  ]);
}

/** 勝利：明るいファンファーレ */
function sfxWin() {
  sfx([
    { freq:523, dur:0.15, type:'sine', vol:0.18 },         // C5
    { freq:659, dur:0.15, type:'sine', vol:0.18, start:0.14 }, // E5
    { freq:784, dur:0.15, type:'sine', vol:0.18, start:0.28 }, // G5
    { freq:1047,dur:0.35, type:'sine', vol:0.20, start:0.42 }, // C6
    { freq:784, dur:0.35, type:'sine', vol:0.14, start:0.42 }, // 和音
  ]);
}

/** 敗北：暗く沈んでいく音 */
function sfxLose() {
  sfx([
    { freq:330, dur:0.20, type:'triangle', vol:0.16 },
    { freq:277, dur:0.20, type:'triangle', vol:0.14, start:0.18 },
    { freq:220, dur:0.30, type:'triangle', vol:0.12, start:0.36 },
    { freq:165, dur:0.40, type:'triangle', vol:0.10, start:0.54 },
  ]);
}

// ================================================================
// パーティクルエフェクトエンジン
// ================================================================
(function() {
  const canvas = () => document.getElementById('fx-canvas');
  let particles = [];
  let rafId = null;

  function resize() {
    const cv = canvas(); if (!cv) return;
    cv.width  = window.innerWidth;
    cv.height = window.innerHeight;
  }
  window.addEventListener('resize', resize);
  document.addEventListener('DOMContentLoaded', resize);

  function loop() {
    const cv = canvas(); if (!cv) return;
    const ctx = cv.getContext('2d');
    ctx.clearRect(0, 0, cv.width, cv.height);
    particles = particles.filter(p => p.life > 0);
    particles.forEach(p => {
      p.x    += p.vx;
      p.y    += p.vy;
      p.vy   += p.gravity;
      p.vx   *= p.friction;
      p.life -= p.decay;
      p.size *= 0.97;
      ctx.save();
      ctx.globalAlpha = Math.max(0, p.life);
      ctx.fillStyle   = p.color;
      ctx.shadowColor = p.color;
      ctx.shadowBlur  = p.glow;
      ctx.beginPath();
      ctx.arc(p.x, p.y, Math.max(0, p.size), 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    });
    if (particles.length > 0) {
      rafId = requestAnimationFrame(loop);
    } else {
      rafId = null;
    }
  }

  function spawn(x, y, opts) {
    const count = opts.count || 30;
    for (let i = 0; i < count; i++) {
      const angle  = (Math.PI * 2 / count) * i + (Math.random() - .5) * .8;
      const speed  = opts.speed * (.5 + Math.random() * .8);
      particles.push({
        x, y,
        vx:      Math.cos(angle) * speed,
        vy:      Math.sin(angle) * speed - (opts.upward || 0),
        size:    opts.size * (.6 + Math.random() * .8),
        color:   Array.isArray(opts.color)
                   ? opts.color[Math.floor(Math.random() * opts.color.length)]
                   : opts.color,
        glow:    opts.glow || 6,
        life:    1.0,
        decay:   opts.decay || 0.022,
        gravity: opts.gravity || 0.06,
        friction:opts.friction || 0.96,
      });
    }
    if (!rafId) rafId = requestAnimationFrame(loop);
  }

  // 画面中央座標を返す
  function center() {
    return { x: window.innerWidth / 2, y: window.innerHeight / 2 };
  }

  /** 捨て札エフェクト（死神・皇帝・少年）: 赤い消滅パーティクル */
  window.fxDiscard = function() {
    const {x, y} = center();
    spawn(x, y, {
      count:   40,
      speed:   5.5,
      size:    5,
      color:   ['#e74c3c','#c0392b','#ff6b6b','#ff9999','#8b0000'],
      glow:    12,
      decay:   0.018,
      gravity: 0.08,
      upward:  1.5,
    });
    // 中心から少し遅れて暗い粒子
    setTimeout(() => {
      spawn(x, y, {
        count:   20,
        speed:   3,
        size:    3,
        color:   ['#4a0000','#800000','#ff4444'],
        glow:    8,
        decay:   0.025,
        gravity: 0.05,
      });
    }, 80);
  };

  /** 守護エフェクト（乙女）: 青い光の粒子がリング状に広がる */
  // 守護エフェクト専用アニメーション
  let guardianAnim = null;

  window.fxGuardian = function() {
    const cv  = canvas(); if (!cv) return;
    const ctx = cv.getContext('2d');
    const cx  = cv.width  / 2;
    const cy  = cv.height / 2;

    // シールドリングアニメーション
    let frame   = 0;
    const total = 60; // フレーム数（約1秒）

    if (guardianAnim) { cancelAnimationFrame(guardianAnim); guardianAnim = null; }

    function drawShield() {
      const t = frame / total;          // 0→1 の進行度
      const easeOut = 1 - Math.pow(1 - t, 3);

      // ── 外側リング ──
      const maxR  = Math.min(cv.width, cv.height) * 0.32;
      const r     = maxR * Math.min(easeOut * 1.4, 1.0);
      const alpha = t < 0.6 ? 1.0 : 1.0 - (t - 0.6) / 0.4; // 後半でフェードアウト

      ctx.save();

      // シールドの光彩（外側）
      const grd = ctx.createRadialGradient(cx, cy, r * 0.7, cx, cy, r + 18);
      grd.addColorStop(0,   `rgba(82,190,255,0)`);
      grd.addColorStop(0.5, `rgba(82,190,255,${0.18 * alpha})`);
      grd.addColorStop(1,   `rgba(52,152,219,0)`);
      ctx.beginPath();
      ctx.arc(cx, cy, r + 18, 0, Math.PI * 2);
      ctx.fillStyle = grd;
      ctx.fill();

      // メインリング
      ctx.beginPath();
      ctx.arc(cx, cy, r, 0, Math.PI * 2);
      ctx.strokeStyle = `rgba(93,173,226,${0.9 * alpha})`;
      ctx.lineWidth   = 3.5;
      ctx.shadowColor = '#3498db';
      ctx.shadowBlur  = 24 * alpha;
      ctx.stroke();

      // 内側リング（少し遅れて追従）
      const r2 = r * 0.78;
      ctx.beginPath();
      ctx.arc(cx, cy, r2, 0, Math.PI * 2);
      ctx.strokeStyle = `rgba(174,214,241,${0.5 * alpha})`;
      ctx.lineWidth   = 1.5;
      ctx.shadowBlur  = 12 * alpha;
      ctx.stroke();

      // リム上を流れる光の点
      const dotCount = 8;
      for (let i = 0; i < dotCount; i++) {
        const angle = (Math.PI * 2 / dotCount) * i + (frame * 0.08);
        const dx = cx + Math.cos(angle) * r;
        const dy = cy + Math.sin(angle) * r;
        ctx.beginPath();
        ctx.arc(dx, dy, 4, 0, Math.PI * 2);
        ctx.fillStyle   = `rgba(255,255,255,${0.85 * alpha})`;
        ctx.shadowColor = '#ffffff';
        ctx.shadowBlur  = 14;
        ctx.fill();
      }

      // 中心の光点
      if (t < 0.5) {
        const cAlpha = (1 - t * 2) * alpha;
        const cGrd = ctx.createRadialGradient(cx, cy, 0, cx, cy, 40);
        cGrd.addColorStop(0,   `rgba(255,255,255,${0.6 * cAlpha})`);
        cGrd.addColorStop(0.4, `rgba(93,173,226,${0.3 * cAlpha})`);
        cGrd.addColorStop(1,   `rgba(52,152,219,0)`);
        ctx.beginPath();
        ctx.arc(cx, cy, 40, 0, Math.PI * 2);
        ctx.fillStyle = cGrd;
        ctx.shadowBlur = 0;
        ctx.fill();
      }

      ctx.restore();
      frame++;

      if (frame <= total) {
        guardianAnim = requestAnimationFrame(drawShield);
      } else {
        guardianAnim = null;
        // パーティクルで残像
        spawn(cx, cy, {
          count:   30,
          speed:   5,
          size:    3,
          color:   ['#3498db','#5dade2','#85c1e9','#aed6f1','#ffffff'],
          glow:    14,
          decay:   0.022,
          gravity: -0.015,
          friction:0.93,
        });
        if (!rafId) rafId = requestAnimationFrame(loop);
      }
    }

    guardianAnim = requestAnimationFrame(drawShield);
  };

  // 貴族エフェクト専用アニメーション
  let duelAnim = null;

  window.fxDuel = function(result) {
    // result: 'left' | 'right' | 'draw'
    const cv  = canvas(); if (!cv) return;
    const ctx = cv.getContext('2d');
    const cx  = cv.width  / 2;
    const cy  = cv.height / 2;

    if (duelAnim) { cancelAnimationFrame(duelAnim); duelAnim = null; }

    let frame = 0;
    const APPROACH = 28;  // 接近フレーム
    const CLASH    = 12;  // 衝突フレーム
    const RESULT   = 30;  // 結果フレーム
    const TOTAL    = APPROACH + CLASH + RESULT;

    // 左右の光弾の色（ゴールド vs シルバー）
    const colL = '#c9a84c';
    const colR = '#aaaacc';

    function drawDuel() {
      const t = frame;
      ctx.save();

      if (t < APPROACH) {
        // ── フェーズ1: 左右から光弾が中央へ接近 ──
        const prog = t / APPROACH;           // 0→1
        const ease = 1 - Math.pow(1 - prog, 2);
        const dist = (1 - ease) * cx * 0.7; // 中央からの距離

        // 左の光弾
        const lx = cx - dist;
        drawOrb(ctx, lx, cy, 14, colL, 28);
        // 右の光弾
        const rx = cx + dist;
        drawOrb(ctx, rx, cy, 14, colR, 28);

        // 軌跡
        drawTrail(ctx, cx - dist - 30, cy, dist, colL);
        drawTrailR(ctx, cx + dist + 30, cy, dist, colR);

      } else if (t < APPROACH + CLASH) {
        // ── フェーズ2: 衝突・衝撃波 ──
        const prog = (t - APPROACH) / CLASH;
        const shockR = prog * Math.min(cx, cy) * 0.6;
        const alpha  = 1 - prog;

        // 衝撃波リング
        ctx.beginPath();
        ctx.arc(cx, cy, shockR, 0, Math.PI * 2);
        ctx.strokeStyle = `rgba(255,230,100,${alpha * 0.9})`;
        ctx.lineWidth   = 6 * (1 - prog * 0.5);
        ctx.shadowColor = '#ffdd00';
        ctx.shadowBlur  = 30;
        ctx.stroke();

        // 内側リング
        ctx.beginPath();
        ctx.arc(cx, cy, shockR * 0.6, 0, Math.PI * 2);
        ctx.strokeStyle = `rgba(255,255,255,${alpha * 0.6})`;
        ctx.lineWidth   = 2;
        ctx.shadowBlur  = 16;
        ctx.stroke();

        // 中心フラッシュ
        const flashGrd = ctx.createRadialGradient(cx, cy, 0, cx, cy, 60 * (1 - prog));
        flashGrd.addColorStop(0, `rgba(255,255,255,${alpha * 0.85})`);
        flashGrd.addColorStop(0.4, `rgba(255,220,80,${alpha * 0.4})`);
        flashGrd.addColorStop(1, `rgba(255,200,0,0)`);
        ctx.beginPath();
        ctx.arc(cx, cy, 60 * (1 - prog * 0.3), 0, Math.PI * 2);
        ctx.fillStyle = flashGrd;
        ctx.shadowBlur = 0;
        ctx.fill();

        if (t === APPROACH) {
          // 衝突時にパーティクルを大量放出
          const cols = ['#ffdd00','#ffaa00','#ffffff','#ff8800','#ffffaa'];
          spawn(cx, cy, { count:55, speed:9, size:5, color:cols, glow:18, decay:0.02, gravity:0.04, upward:1 });
          setTimeout(() => {
            spawn(cx, cy, { count:25, speed:4, size:3, color:['#c9a84c','#ffffff','#ffd700'], glow:12, decay:0.028, gravity:0.06 });
          }, 60);
          // 結果によって色を変えたパーティクル
          if (result === 'draw') {
            spawn(cx, cy, { count:20, speed:6, size:4, color:['#e74c3c','#c0392b','#ff6b6b'], glow:14, decay:0.022, gravity:0.05, upward:0.5 });
          }
        }

      } else {
        // ── フェーズ3: 結果演出 ──
        const prog  = (t - APPROACH - CLASH) / RESULT;
        const alpha = 1 - prog;

        if (result !== 'draw') {
          // 勝者側に輝くオーラ
          const winX = result === 'left' ? cx - cx * 0.4 : cx + cx * 0.4;
          const aurR = 30 + prog * 20;
          const aurGrd = ctx.createRadialGradient(winX, cy, 0, winX, cy, aurR);
          aurGrd.addColorStop(0, `rgba(255,220,60,${alpha * 0.5})`);
          aurGrd.addColorStop(1, `rgba(255,180,0,0)`);
          ctx.beginPath();
          ctx.arc(winX, cy, aurR, 0, Math.PI * 2);
          ctx.fillStyle = aurGrd;
          ctx.fill();
        }
      }

      ctx.restore();
      frame++;
      if (frame <= TOTAL) {
        duelAnim = requestAnimationFrame(drawDuel);
      } else {
        duelAnim = null;
        if (!rafId) rafId = requestAnimationFrame(loop);
      }
    }

    duelAnim = requestAnimationFrame(drawDuel);
  };

  function drawOrb(ctx, x, y, r, color, glowSize) {
    const grd = ctx.createRadialGradient(x, y, 0, x, y, r);
    grd.addColorStop(0,   'rgba(255,255,255,0.95)');
    grd.addColorStop(0.3, color.replace(')', ',0.9)').replace('rgb', 'rgba'));
    grd.addColorStop(1,   color.replace(')', ',0)').replace('rgb', 'rgba'));
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.fillStyle   = grd;
    ctx.shadowColor = color;
    ctx.shadowBlur  = glowSize;
    ctx.fill();
  }

  function drawTrail(ctx, startX, cy, dist, color) {
    const grad = ctx.createLinearGradient(startX, cy, startX + dist, cy);
    grad.addColorStop(0, 'rgba(0,0,0,0)');
    grad.addColorStop(1, color.replace(')', ',0.35)').replace('rgb','rgba'));
    ctx.beginPath();
    ctx.moveTo(startX, cy);
    ctx.lineTo(startX + dist, cy);
    ctx.strokeStyle = grad;
    ctx.lineWidth   = 4;
    ctx.shadowBlur  = 0;
    ctx.stroke();
  }

  function drawTrailR(ctx, startX, cy, dist, color) {
    const grad = ctx.createLinearGradient(startX, cy, startX - dist, cy);
    grad.addColorStop(0, 'rgba(0,0,0,0)');
    grad.addColorStop(1, color.replace(')', ',0.35)').replace('rgb','rgba'));
    ctx.beginPath();
    ctx.moveTo(startX, cy);
    ctx.lineTo(startX - dist, cy);
    ctx.strokeStyle = grad;
    ctx.lineWidth   = 4;
    ctx.shadowBlur  = 0;
    ctx.stroke();
  }

  // 占師エフェクト専用アニメーション
  let revealAnim = null;

  window.fxReveal = function() {
    const cv  = canvas(); if (!cv) return;
    const ctx = cv.getContext('2d');
    const cx  = cv.width  / 2;
    const cy  = cv.height / 2;

    if (revealAnim) { cancelAnimationFrame(revealAnim); revealAnim = null; }

    let frame = 0;
    const TOTAL = 70;

    function draw() {
      const t     = frame / TOTAL;       // 0→1
      const easeIn = t * t;
      ctx.save();

      // ── 回転する星形のオーラリング ──
      const maxR = Math.min(cx, cy) * 0.38;
      const r    = maxR * Math.min(t * 2.2, 1.0);
      const fade = t < 0.65 ? 1.0 : 1.0 - (t - 0.65) / 0.35;

      // 外側グロー
      const grdO = ctx.createRadialGradient(cx, cy, r * 0.6, cx, cy, r + 30);
      grdO.addColorStop(0,   `rgba(180,120,255,0)`);
      grdO.addColorStop(0.5, `rgba(160,80,240,${0.15 * fade})`);
      grdO.addColorStop(1,   `rgba(100,20,180,0)`);
      ctx.beginPath();
      ctx.arc(cx, cy, r + 30, 0, Math.PI * 2);
      ctx.fillStyle = grdO;
      ctx.fill();

      // メインリング
      ctx.beginPath();
      ctx.arc(cx, cy, r, 0, Math.PI * 2);
      ctx.strokeStyle = `rgba(200,130,255,${0.85 * fade})`;
      ctx.lineWidth   = 2.5;
      ctx.shadowColor = '#b060ff';
      ctx.shadowBlur  = 20 * fade;
      ctx.stroke();

      // ── 回転するシンボル点（6個）──
      const dotR  = r * 0.85;
      const speed = frame * 0.045;
      for (let i = 0; i < 6; i++) {
        const angle = (Math.PI * 2 / 6) * i + speed;
        const px = cx + Math.cos(angle) * dotR;
        const py = cy + Math.sin(angle) * dotR;
        const sz = 3.5 + Math.sin(frame * 0.12 + i) * 1.5;
        ctx.beginPath();
        ctx.arc(px, py, sz, 0, Math.PI * 2);
        ctx.fillStyle   = `rgba(230,180,255,${0.9 * fade})`;
        ctx.shadowColor = '#cc88ff';
        ctx.shadowBlur  = 12 * fade;
        ctx.fill();
      }

      // ── 逆回転の内側三角形 ──
      if (r > maxR * 0.3) {
        const triR  = r * 0.45;
        const tSpeed = -frame * 0.03;
        ctx.beginPath();
        for (let i = 0; i < 3; i++) {
          const a = (Math.PI * 2 / 3) * i + tSpeed - Math.PI / 2;
          const px = cx + Math.cos(a) * triR;
          const py = cy + Math.sin(a) * triR;
          i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
        }
        ctx.closePath();
        ctx.strokeStyle = `rgba(220,160,255,${0.55 * fade})`;
        ctx.lineWidth   = 1.5;
        ctx.shadowColor = '#aa44ff';
        ctx.shadowBlur  = 10 * fade;
        ctx.stroke();
      }

      // ── 中心の魔法陣グロー ──
      if (t < 0.7) {
        const cFade = (1 - t / 0.7) * fade;
        const cGrd  = ctx.createRadialGradient(cx, cy, 0, cx, cy, 50);
        cGrd.addColorStop(0,   `rgba(240,200,255,${0.7 * cFade})`);
        cGrd.addColorStop(0.4, `rgba(180,80,255,${0.3 * cFade})`);
        cGrd.addColorStop(1,   `rgba(120,0,200,0)`);
        ctx.beginPath();
        ctx.arc(cx, cy, 50, 0, Math.PI * 2);
        ctx.fillStyle  = cGrd;
        ctx.shadowBlur = 0;
        ctx.fill();
      }

      // ── 星屑パーティクル（ふわふわ漂う小粒）──
      if (frame % 4 === 0 && t < 0.6) {
        const angle = Math.random() * Math.PI * 2;
        const dist  = r * (0.3 + Math.random() * 0.8);
        spawn(
          cx + Math.cos(angle) * dist,
          cy + Math.sin(angle) * dist,
          { count:1, speed:0.8, size:2, color:['#e0b0ff','#cc88ff','#ffffff'], glow:8, decay:0.03, gravity:-0.01, friction:0.92 }
        );
        if (!rafId) rafId = requestAnimationFrame(loop);
      }

      ctx.restore();
      frame++;
      if (frame <= TOTAL) {
        revealAnim = requestAnimationFrame(draw);
      } else {
        revealAnim = null;
        // 消える時に紫パーティクルを放出
        spawn(cx, cy, { count:28, speed:4.5, size:3, color:['#b060ff','#cc88ff','#e0b0ff','#ffffff'], glow:14, decay:0.024, gravity:-0.01, friction:0.93 });
        if (!rafId) rafId = requestAnimationFrame(loop);
      }
    }

    revealAnim = requestAnimationFrame(draw);
  };


  // 転生エフェクト専用アニメーション
  let rebirthAnim = null;

  window.fxRebirth = function() {
    const cv  = canvas(); if (!cv) return;
    const ctx = cv.getContext('2d');
    const cx  = cv.width  / 2;
    const cy  = cv.height / 2;

    if (rebirthAnim) { cancelAnimationFrame(rebirthAnim); rebirthAnim = null; }

    let frame = 0;
    const TOTAL = 90; // 約1.5秒

    function draw() {
      const t    = frame / TOTAL;
      const fade = t < 0.7 ? 1.0 : 1.0 - (t - 0.7) / 0.3;
      ctx.save();

      // ── フェーズ1(0〜0.4): 暗闇から光が生まれる ──
      if (t < 0.4) {
        const prog  = t / 0.4;
        const eased = prog * prog;
        // 中心の白い光点が膨張
        const r    = eased * 50;
        const grd  = ctx.createRadialGradient(cx, cy, 0, cx, cy, r);
        grd.addColorStop(0,   `rgba(255,255,255,${eased * 0.9})`);
        grd.addColorStop(0.4, `rgba(255,220,100,${eased * 0.6})`);
        grd.addColorStop(1,   `rgba(201,168,76,0)`);
        ctx.beginPath();
        ctx.arc(cx, cy, Math.max(r, 1), 0, Math.PI * 2);
        ctx.fillStyle  = grd;
        ctx.shadowBlur = 0;
        ctx.fill();
      }

      // ── フェーズ2(0.3〜0.8): 上昇する光の柱 ──
      if (t > 0.3 && t < 0.85) {
        const prog  = (t - 0.3) / 0.55;
        const alpha = prog < 0.7 ? prog / 0.7 : 1.0 - (prog - 0.7) / 0.3;
        const colH  = cv.height * 0.55;

        // 光の柱（下から上へ）
        const pillarGrd = ctx.createLinearGradient(cx, cy + colH * 0.3, cx, cy - colH);
        pillarGrd.addColorStop(0,   `rgba(201,168,76,0)`);
        pillarGrd.addColorStop(0.2, `rgba(255,230,120,${0.35 * alpha})`);
        pillarGrd.addColorStop(0.5, `rgba(255,255,200,${0.55 * alpha})`);
        pillarGrd.addColorStop(0.8, `rgba(255,220,80,${0.35 * alpha})`);
        pillarGrd.addColorStop(1,   `rgba(201,168,76,0)`);
        ctx.beginPath();
        ctx.rect(cx - 28, cy - colH, 56, colH * 1.3);
        ctx.fillStyle  = pillarGrd;
        ctx.shadowBlur = 0;
        ctx.fill();

        // 柱の縁の光ライン
        for (const ox of [-28, 28]) {
          const lineGrd = ctx.createLinearGradient(cx + ox, cy, cx + ox, cy - colH);
          lineGrd.addColorStop(0,   `rgba(255,200,60,0)`);
          lineGrd.addColorStop(0.4, `rgba(255,230,100,${0.7 * alpha})`);
          lineGrd.addColorStop(1,   `rgba(255,255,200,0)`);
          ctx.beginPath();
          ctx.moveTo(cx + ox, cy + 10);
          ctx.lineTo(cx + ox, cy - colH);
          ctx.strokeStyle = lineGrd;
          ctx.lineWidth   = 1.5;
          ctx.stroke();
        }
      }

      // ── フェーズ2: 上昇するパーティクルを間欠的に放出 ──
      if (frame % 3 === 0 && t > 0.25 && t < 0.8) {
        const px = cx + (Math.random() - 0.5) * 50;
        const py = cy + 20;
        spawn(px, py, {
          count:   1,
          speed:   0.5 + Math.random() * 1.5,
          size:    2.5 + Math.random() * 2,
          color:   ['#ffd700','#ffec6e','#fffacd','#ffffff','#c9a84c'],
          glow:    12,
          decay:   0.016,
          gravity: -0.12, // 上昇
          friction:0.97,
          upward:  0,
        });
        if (!rafId) rafId = requestAnimationFrame(loop);
      }

      // ── フェーズ3(0.6〜1.0): 輝くリングが広がる ──
      if (t > 0.6) {
        const prog  = (t - 0.6) / 0.4;
        const rRing = prog * Math.min(cx, cy) * 0.55;
        const aRing = (1 - prog) * fade;
        ctx.beginPath();
        ctx.arc(cx, cy, rRing, 0, Math.PI * 2);
        ctx.strokeStyle = `rgba(255,220,80,${aRing * 0.8})`;
        ctx.lineWidth   = 4;
        ctx.shadowColor = '#ffd700';
        ctx.shadowBlur  = 22 * aRing;
        ctx.stroke();
        // 内側リング
        ctx.beginPath();
        ctx.arc(cx, cy, rRing * 0.65, 0, Math.PI * 2);
        ctx.strokeStyle = `rgba(255,255,200,${aRing * 0.5})`;
        ctx.lineWidth   = 1.5;
        ctx.shadowBlur  = 10 * aRing;
        ctx.stroke();

        // リング上を回る光点
        for (let i = 0; i < 8; i++) {
          const a  = (Math.PI * 2 / 8) * i + prog * Math.PI * 3;
          const px = cx + Math.cos(a) * rRing;
          const py = cy + Math.sin(a) * rRing;
          ctx.beginPath();
          ctx.arc(px, py, 3.5, 0, Math.PI * 2);
          ctx.fillStyle   = `rgba(255,255,180,${aRing * 0.9})`;
          ctx.shadowColor = '#ffffff';
          ctx.shadowBlur  = 10 * aRing;
          ctx.fill();
        }
      }

      ctx.restore();
      frame++;
      if (frame <= TOTAL) {
        rebirthAnim = requestAnimationFrame(draw);
      } else {
        rebirthAnim = null;
        // 最後にゴールドパーティクルを放出
        spawn(cx, cy, { count:40, speed:6, size:4, color:['#ffd700','#ffec6e','#fffacd','#c9a84c','#ffffff'], glow:16, decay:0.018, gravity:-0.03, friction:0.94 });
        if (!rafId) rafId = requestAnimationFrame(loop);
      }
    }

    rebirthAnim = requestAnimationFrame(draw);
  };

})();

 *       生成したコードを Firebase のルームキーとして使用する。
 * @returns {string} 6文字の英数字コード

function genCode() {
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  return Array.from({length:6}, () => chars[Math.floor(Math.random()*chars.length)]).join('');
}

 *       myPid は既存プレイヤー数（末尾に追加するため）。

async function joinRoom() {
  try {
    if (!myUid) { toast('Firebase接続中。少し待ってから再試行してください', true); return; }
    const name = q('join-name').value.trim() || 'ゲスト';
    const code = q('join-code').value.trim().toUpperCase();
    if (code.length < 4) { toast('ルームコードを入力してください', true); return; }
    toast('参加中...');
    const snap = await getRoom(code);
    if (!snap.exists())          { toast('部屋が見つかりません', true); return; }
    const room = snap.val();
    if (room.status !== 'lobby') { toast('ゲームはすでに始まっています', true); return; }
    const players = Array.isArray(room.players) ? room.players : Object.values(room.players);
    if (players.length >= 4)     { toast('部屋が満員です', true); return; }
    isHost = false; roomCode = code; myPid = players.length;
    players.push({ uid:myUid, name, ready:false, pid:myPid });
    await setField(`rooms/${code}/players`, players);
    enterLobby();
  } catch(e) {

    toast('エラー: ' + e.message.slice(0, 60), true);

 * 詳細: listenRoom() で rooms/{roomCode} 全体を監視する。
 *       - status が 'playing'/'ended' かつ gsJson あり → ゲーム画面へ遷移して onGsReceived() を呼ぶ
 *       - それ以外 → renderLobby() でロビー画面を更新する
 *       既存のリスナーがある場合は先に解除してから再設定する。
 */
function enterLobby() {
  q('code-disp').textContent = roomCode;
  showScreen('lobby-screen');
  startChat();
  if (unsubRoom) unsubRoom();
  unsubRoom = listenRoom(roomCode, snap => {
    if (!snap.exists()) { backToTitle(); return; }
    const room = snap.val();
    if ((room.status === 'playing' || room.status === 'ended') && room.gsJson) {
      if (!q('game-screen').classList.contains('active')) {
        logLen = 0;
        showScreen('game-screen');
      }
      // gsJson は文字列 → JSON.parse で完全な配列構造を復元
      onGsReceived(JSON.parse(room.gsJson));
    } else {
      renderLobby(room);
    }
  });
}

/**
 * 概要: ロビー画面のプレイヤー一覧と操作ボタンを更新する。
 * 詳細:
 *   - room.hostUid と myUid を毎回比較して isHost を同期する
 *     （ホスト退出後のホスト交代に対応するため）
 *   - isHost=true の場合: 「ゲーム開始」ボタンを表示し、
 *     全ゲストが準備完了かつ2人以上いる場合のみ有効化する
 *   - isHost=false の場合: 「準備完了」ボタンを表示する
 *   - 自分がプレイヤーリストにいない場合はタイトルへ戻る（退出処理済み）
 * @param {Object} room - Firebase から取得したルームデータ
 */
function renderLobby(room) {
  const players = room.players
    ? (Array.isArray(room.players) ? room.players : Object.values(room.players))
    : [];
  // 自分がプレイヤーリストに存在しなければタイトルへ
  if (players.length > 0 && !players.find(p => p.uid === myUid)) {
    backToTitle(); return;
  }
  // hostUid を Firebase から毎回確認して isHost を同期する
  // （ホストが退出してホスト交代が起きた場合に対応）
  if (room.hostUid) isHost = (room.hostUid === myUid);

  const stats = room.stats || {};
  q('plist').innerHTML = players.map((p, i) => {
    const me   = p.uid === myUid, host = i === 0, rdy = !!p.ready;
    const st   = stats[p.uid] || { wins:0, draws:0, losses:0 };
    const total= (st.wins||0) + (st.draws||0) + (st.losses||0);
    const statsHTML = total > 0
      ? `<div class="stats-row">
           <span class="stat-pill stat-w">${st.wins||0}勝</span>
           <span class="stat-pill stat-d">${st.draws||0}分</span>
           <span class="stat-pill stat-l">${st.losses||0}敗</span>
         </div>`
      : '';
    return `<div class="pr ${rdy ? 'rdy' : ''}">
      <div class="pdot"></div>
      <div class="pnm">${p.name}${me ? ' (あなた)' : ''}</div>
      ${host ? '<span class="pbg bhost">HOST</span>' : ''}
      <span class="pbg ${rdy ? 'brdy' : 'bwait'}">${rdy ? '準備完了' : '待機中'}</span>
      ${statsHTML}
    </div>`;
  }).join('');

  const rb = q('ready-btn'), sb = q('start-btn');
  if (isHost) {
    rb.style.display = 'none';
    sb.style.display = '';
    // ゲスト全員が ready かつ 2人以上の場合のみ開始ボタンを有効化
    const nonHost = players.slice(1);
    sb.disabled = !(nonHost.length > 0 && nonHost.every(p => p.ready) && players.length >= 2);
  } else {
    rb.style.display = '';
    sb.style.display = 'none';
    rb.textContent   = localReady ? '準備中止' : '準備完了';
    rb.className     = `btn ${localReady ? 'btn-g' : 'btn-o'}`;
  }
}

/**
 * 概要: 自分の準備状態をトグルして Firebase に書き込む。
 * 詳細: localReady を反転させ、
 *       rooms/{roomCode}/players/{myPid}/ready に書き込む。
 *       ホストの renderLobby() がリスナー経由で変化を受け取り

async function toggleReady() {

/**

 * 詳細: Firebase からルームの最新プレイヤーリストを取得してから
 *       buildInitialGS() でゲーム初期状態を生成し、
 *       status='playing' と gsJson を書き込む。
 *       全プレイヤーのリスナーが発火してゲーム画面へ遷移する。

async function startGame() {
  try {
    const snap    = await getRoom(roomCode);
    const room    = snap.val();
    const players = Array.isArray(room.players)
      ? room.players : Object.values(room.players);
    const gs = buildInitialGS(players);
    await setField(`rooms/${roomCode}/status`, 'playing');
    await saveGS(roomCode, gs);
  } catch(e) {
    console.error('startGame:', e);
    toast('エラー: ' + e.message.slice(0, 60), true);
  }
}
