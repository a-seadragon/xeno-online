<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XENO Online</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Noto+Serif+JP:wght@300;400;600;700&family=Cinzel:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{
  --gold:#c9a84c;--gold-l:#f0d080;--gold-d:#8a6820;
  --deep:#080810;--panel:#141422;--panel2:#1c1c30;
  --border:#252540;--border2:#2e2e50;
  --text:#e4ddd0;--dim:#6a6480;
  --red:#c0392b;--red-l:#e74c3c;
  --blue:#2471a3;--blue-l:#3498db;
  --green:#1e8449;--green-l:#27ae60;
  --purple:#7d3c98;
  --cw:88px;--ch:126px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--deep);color:var(--text);font-family:'Noto Serif JP',serif;min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse at 30% 20%,rgba(201,168,76,.04),transparent 50%),
             radial-gradient(ellipse at 70% 80%,rgba(100,50,150,.04),transparent 50%)}
.screen{display:none;min-height:100vh;position:relative;z-index:1}
.screen.active{display:flex;flex-direction:column;align-items:center;justify-content:center}
#game-screen.active{justify-content:flex-start}
/* title */
#title-screen{padding:40px 20px}
.logo-wrap{text-align:center;margin-bottom:28px}
.logo-eye{font-family:'Cinzel',serif;font-size:10px;letter-spacing:10px;color:var(--gold);opacity:.6;margin-bottom:10px}
.logo-main{font-family:'Cinzel Decorative',cursive;font-size:clamp(54px,11vw,104px);font-weight:900;letter-spacing:.15em;
  background:linear-gradient(145deg,#8a6820 0%,#c9a84c 30%,#f0d080 55%,#c9a84c 75%,#8a6820 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  animation:sh 4s ease-in-out infinite;filter:drop-shadow(0 0 24px rgba(201,168,76,.25))}
@keyframes sh{0%,100%{filter:drop-shadow(0 0 16px rgba(201,168,76,.2))}50%{filter:drop-shadow(0 0 36px rgba(201,168,76,.5))}}
.logo-sub{font-family:'Cinzel',serif;font-size:12px;letter-spacing:6px;color:var(--gold);opacity:.5;margin-top:8px}
.ob{display:inline-block;background:rgba(201,168,76,.1);border:1px solid var(--gold-d);
  color:var(--gold);font-family:'Cinzel',serif;font-size:9px;letter-spacing:4px;padding:4px 14px;border-radius:2px;margin-top:10px}
.div{width:180px;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:22px auto}
.cbadge{font-family:'Cinzel',serif;font-size:9px;letter-spacing:2px;padding:3px 10px;border-radius:2px;display:inline-block;margin-bottom:16px}
.cok{background:rgba(39,174,96,.1);border:1px solid var(--green);color:var(--green-l)}
.cerr{background:rgba(192,57,43,.1);border:1px solid var(--red);color:var(--red-l)}
.lcards{display:flex;gap:14px;flex-wrap:wrap;justify-content:center;max-width:560px;width:100%}
.lc{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:24px 20px;
  flex:1;min-width:238px;max-width:258px;transition:border-color .2s}
.lc:hover{border-color:var(--border2)}
.lct{font-family:'Cinzel',serif;color:var(--gold);font-size:13px;letter-spacing:3px;margin-bottom:13px;text-align:center}
.inp{width:100%;background:#0a0a14;border:1px solid var(--border);color:var(--text);
  padding:11px 13px;font-family:'Noto Serif JP',serif;font-size:14px;border-radius:5px;outline:none;
  transition:border-color .2s;margin-bottom:10px}
.inp:focus{border-color:var(--gold)}.inp::placeholder{color:var(--dim)}
.cinp{font-family:'Cinzel',serif;font-size:20px;letter-spacing:8px;text-align:center;text-transform:uppercase}
.btn{width:100%;border:none;padding:13px;font-family:'Cinzel',serif;font-size:12px;letter-spacing:3px;
  text-transform:uppercase;cursor:pointer;border-radius:5px;transition:all .2s}
.btn-g{background:linear-gradient(135deg,#c9a84c,#8a6820);color:#080810;font-weight:700}
.btn-g:hover:not(:disabled){background:linear-gradient(135deg,#f0d080,#c9a84c);box-shadow:0 0 26px rgba(201,168,76,.3)}
.btn-o{background:transparent;border:1px solid var(--border2);color:var(--text)}
.btn-o:hover:not(:disabled){border-color:var(--gold);color:var(--gold)}
.btn:disabled{opacity:.35;cursor:not-allowed}
.btn-sm{width:auto;padding:8px 18px;font-size:10px;letter-spacing:2px}
/* lobby */
#lobby-screen{padding:24px 16px;gap:16px}
.cdsp{font-family:'Cinzel Decorative',cursive;font-size:clamp(30px,6vw,50px);color:var(--gold);
  letter-spacing:.2em;text-shadow:0 0 28px rgba(201,168,76,.3);cursor:pointer;transition:all .2s;user-select:none;text-align:center}
.cdsp:hover{text-shadow:0 0 48px rgba(201,168,76,.6)}
.chint{font-size:10px;color:var(--dim);font-family:'Cinzel',serif;letter-spacing:2px;margin-top:4px;text-align:center}
.slbl{font-family:'Cinzel',serif;font-size:10px;color:var(--dim);letter-spacing:4px;text-transform:uppercase;margin-bottom:10px}
.plist{display:flex;flex-direction:column;gap:7px;width:100%;max-width:420px}
.pr{background:var(--panel);border:1px solid var(--border);border-radius:6px;
  padding:10px 15px;display:flex;align-items:center;gap:9px;transition:all .3s}
.pr.rdy{border-color:var(--green);background:rgba(39,174,96,.05)}
.pdot{width:7px;height:7px;border-radius:50%;background:var(--dim);flex-shrink:0;transition:all .3s}
.pr.rdy .pdot{background:var(--green-l);box-shadow:0 0 7px var(--green)}
.pnm{font-family:'Cinzel',serif;font-size:12px;letter-spacing:2px;flex:1}
.pbg{font-size:8px;font-family:'Cinzel',serif;letter-spacing:1px;padding:2px 8px;border-radius:2px}
.bhost{background:rgba(201,168,76,.15);border:1px solid var(--gold-d);color:var(--gold)}
.brdy{background:rgba(39,174,96,.15);border:1px solid var(--green);color:var(--green-l)}
.bwait{background:rgba(106,100,128,.1);border:1px solid var(--border2);color:var(--dim)}
/* game */
#game-screen{flex-direction:column;padding:0;min-height:100vh;width:100%;align-items:stretch}
.gh{background:var(--panel);border-bottom:1px solid var(--border);padding:8px 15px;
  display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.gtitle{font-family:'Cinzel Decorative',cursive;color:var(--gold);font-size:15px;letter-spacing:3px}
.ginfo{display:flex;gap:14px}
.gst{font-family:'Cinzel',serif;font-size:10px;color:var(--dim);letter-spacing:1px}
.gst span{color:var(--gold);font-size:12px}
.tbar{background:rgba(201,168,76,.04);border-bottom:1px solid rgba(201,168,76,.08);
  padding:5px 15px;display:flex;align-items:center;gap:7px;font-family:'Cinzel',serif;
  font-size:10px;color:var(--dim);letter-spacing:2px;flex-shrink:0}
.tnm{color:var(--gold);font-size:12px}
.mytag{background:rgba(201,168,76,.12);border:1px solid var(--gold-d);color:var(--gold-l);
  font-size:8px;padding:2px 7px;border-radius:2px;letter-spacing:1px}
/* player zones */
.pa{flex:1;padding:10px 12px;display:flex;flex-direction:column;gap:8px;overflow-y:auto}
.pz{background:var(--panel);border:1px solid var(--border);border-radius:7px;padding:10px 12px;transition:all .3s}
.pz.act{border-color:var(--gold);box-shadow:0 0 16px rgba(201,168,76,.13),inset 0 0 14px rgba(201,168,76,.02)}
.pz.ded{opacity:.35;border-color:transparent}
.pz.prt{border-color:var(--blue-l);box-shadow:0 0 11px rgba(52,152,219,.14)}
.pz.me{background:var(--panel2)}
.pzhd{display:flex;align-items:center;gap:7px;margin-bottom:8px}
.pd{width:7px;height:7px;border-radius:50%;background:var(--dim);flex-shrink:0;transition:all .3s}
.pz.act .pd{background:var(--gold);box-shadow:0 0 6px var(--gold)}
.pz.ded .pd{background:var(--red)}
.pz.prt .pd{background:var(--blue-l)}
.pznm{font-family:'Cinzel',serif;font-size:12px;letter-spacing:2px;flex:1}
.pbs{display:flex;gap:4px;flex-wrap:wrap}
.badge{font-size:8px;padding:2px 6px;border-radius:2px;letter-spacing:1px;font-family:'Cinzel',serif;text-transform:uppercase}
.bt{background:rgba(201,168,76,.2);color:var(--gold);border:1px solid var(--gold-d)}
.be{background:rgba(192,57,43,.2);color:var(--red-l);border:1px solid var(--red)}
.bp{background:rgba(41,128,185,.2);color:var(--blue-l);border:1px solid var(--blue)}
.bs{background:rgba(125,60,152,.2);color:#c39bd3;border:1px solid var(--purple)}
.bm{background:rgba(201,168,76,.08);color:var(--gold-l);border:1px solid var(--gold-d);opacity:.7}
.pcs{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.dp{display:flex;gap:3px;flex-wrap:wrap}
.sep{width:1px;height:50px;background:var(--border);margin:0 4px;flex-shrink:0;align-self:center}
/* hand cards */
.hc{width:var(--cw);height:var(--ch);border-radius:6px;border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;transition:all .2s;
  position:relative;overflow:hidden;flex-shrink:0}
.hc.back{background:linear-gradient(135deg,#14142a,#1a1a35);
  background-image:repeating-linear-gradient(45deg,transparent,transparent 4px,rgba(201,168,76,.03) 4px,rgba(201,168,76,.03) 5px)}
.hc.sp{cursor:pointer;border-color:rgba(201,168,76,.35)}
.hc.sp:hover{border-color:var(--gold);transform:translateY(-5px);box-shadow:0 10px 20px rgba(0,0,0,.5)}
.hc.pk{border-color:var(--gold)!important;box-shadow:0 0 20px rgba(201,168,76,.4)!important;transform:translateY(-9px)!important}
.mc{width:44px;height:64px;border-radius:4px;border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden}
.ci{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:5px;gap:2px}
.cr{font-family:'Cinzel Decorative',cursive;font-size:18px;font-weight:700;line-height:1}
.cn{font-size:9px;font-family:'Noto Serif JP',serif;font-weight:600;text-align:center;line-height:1.2}
.ce{font-size:7px;font-family:'Noto Serif JP',serif;opacity:.65;text-align:center}
.mc .cr{font-size:12px}.mc .cn{font-size:7px}
.ddot{position:absolute;top:4px;right:4px;width:6px;height:6px;border-radius:50%;background:var(--gold);box-shadow:0 0 5px var(--gold)}
.c10{background:linear-gradient(135deg,#180d2e,#2a1560);border-color:#7050c0!important;color:#c0a0f0}
.c9{background:linear-gradient(135deg,#1e0808,#450e0e);border-color:#8a1818!important;color:#e87070}
.c8{background:linear-gradient(135deg,#081c2e,#0e3548);border-color:#186888!important;color:#60c0e0}
.c7{background:linear-gradient(135deg,#181600,#353000);border-color:#786800!important;color:#d0b000}
.c6{background:linear-gradient(135deg,#180800,#381600);border-color:#782800!important;color:#e06828}
.c5{background:linear-gradient(135deg,#0c0c0c,#1e1e1e);border-color:#4a4a4a!important;color:#999}
.c4{background:linear-gradient(135deg,#081608,#103520);border-color:#186838!important;color:#58c870}
.c3{background:linear-gradient(135deg,#130820,#281040);border-color:#581888!important;color:#a858d8}
.c2{background:linear-gradient(135deg,#080e20,#101e3c);border-color:#183878!important;color:#5888c8}
.c1{background:linear-gradient(135deg,#0e0e0e,#181828);border-color:#383858!important;color:#7888a8}
/* action panel */
.apl{background:var(--panel);border-top:1px solid var(--border);padding:12px 15px;flex-shrink:0}
.aplt{font-family:'Cinzel',serif;color:var(--gold);font-size:10px;letter-spacing:3px;text-transform:uppercase;margin-bottom:8px;opacity:.7}
.abtns{display:flex;gap:7px;flex-wrap:wrap}
.ab{background:var(--panel2);border:1px solid var(--border);color:var(--text);padding:9px 15px;
  font-family:'Noto Serif JP',serif;font-size:12px;cursor:pointer;border-radius:4px;transition:all .2s}
.ab:hover:not(:disabled){border-color:var(--gold);color:var(--gold);background:rgba(201,168,76,.05)}
.ab:disabled{opacity:.3;cursor:not-allowed}
.ab.cf{background:rgba(201,168,76,.1);border-color:var(--gold-d);color:var(--gold)}
.ab.cf:hover:not(:disabled){background:rgba(201,168,76,.2);box-shadow:0 0 11px rgba(201,168,76,.2)}
.cdsc{background:rgba(0,0,0,.4);border:1px solid var(--border);border-radius:5px;
  padding:8px 12px;font-size:11px;color:var(--dim);line-height:1.7;margin-top:8px;display:none}
.cdsc.vis{display:block}
.wmsg{background:rgba(52,152,219,.07);border:1px solid rgba(52,152,219,.16);border-radius:4px;
  padding:8px 13px;font-family:'Cinzel',serif;font-size:10px;color:var(--blue-l);letter-spacing:2px;text-align:center}
/* log */
.glog{height:68px;background:#060610;border-top:1px solid var(--border);padding:6px 15px;overflow-y:auto;flex-shrink:0}
.le{font-size:11px;color:var(--dim);padding:2px 0;border-bottom:1px solid rgba(255,255,255,.02);line-height:1.5}
.limp{color:var(--gold)}.lact{color:var(--text)}.lelim{color:var(--red-l)}
/* modal */
.mov{position:fixed;inset:0;background:rgba(0,0,0,.88);display:none;
  align-items:center;justify-content:center;z-index:1000;backdrop-filter:blur(4px)}
.mov.on{display:flex}
.mbox{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:24px 24px 20px;
  max-width:430px;width:92%;position:relative}
.mbox::before{content:'';position:absolute;top:0;left:12px;right:12px;height:1px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent)}
.mt{font-family:'Cinzel',serif;color:var(--gold);font-size:14px;letter-spacing:3px;margin-bottom:10px;text-align:center}
.mtx{font-size:11px;color:var(--dim);margin-bottom:14px;text-align:center;line-height:1.8;white-space:pre-line}
.mbd{width:100%}
.mtgts{display:flex;gap:7px;flex-wrap:wrap;justify-content:center;margin-bottom:14px}
.tg{background:var(--panel2);border:1px solid var(--border);color:var(--text);padding:9px 16px;
  font-family:'Noto Serif JP',serif;font-size:12px;cursor:pointer;border-radius:4px;min-width:86px;transition:all .2s}
.tg:hover{border-color:var(--gold);color:var(--gold);background:rgba(201,168,76,.08)}
.mch{display:flex;gap:9px;justify-content:center;flex-wrap:wrap;margin-bottom:14px}
.mcc{cursor:pointer;border-radius:6px;border:2px solid transparent!important;
  width:var(--cw);height:var(--ch);transition:all .2s}
.mcc:hover,.mcc.on{border-color:var(--gold)!important;transform:translateY(-4px);box-shadow:0 8px 16px rgba(201,168,76,.3)}
.mrsel{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;margin-bottom:13px}
.rb{width:37px;height:37px;border-radius:4px;border:1px solid var(--border);background:var(--panel2);
  cursor:pointer;font-family:'Cinzel',serif;font-size:14px;transition:all .2s;
  display:flex;align-items:center;justify-content:center;color:var(--text)}
.rb:hover,.rb.on{border-color:var(--gold);color:var(--gold);background:rgba(201,168,76,.08)}
.mbtns{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-top:13px}
.pbox{text-align:center;margin-bottom:11px}
.pnote{font-size:10px;color:var(--dim);margin-top:7px;letter-spacing:1px}
.blnd{width:var(--cw);height:var(--ch);border-radius:6px;border:1px solid var(--border)!important;
  cursor:pointer;transition:all .2s;background:linear-gradient(135deg,#14142a,#1a1a35)}
.blnd:hover{border-color:var(--gold)!important;transform:translateY(-4px);box-shadow:0 8px 16px rgba(201,168,76,.3)}
/* result */
#result-screen{padding:40px 20px;gap:16px;text-align:center}
.rtl{font-family:'Cinzel Decorative',cursive;font-size:clamp(26px,5vw,44px);letter-spacing:4px;
  background:linear-gradient(135deg,#c9a84c,#f0d080);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.rwn{font-family:'Cinzel',serif;color:var(--gold);font-size:19px;letter-spacing:3px}
.rhands{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;margin:13px 0}
.rpc{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:12px 15px;text-align:center;min-width:102px}
.rpc.w{border-color:var(--gold);box-shadow:0 0 16px rgba(201,168,76,.17)}
.rpn{font-family:'Cinzel',serif;font-size:10px;color:var(--dim);letter-spacing:2px;margin-bottom:8px}
/* toast */
.toast{position:fixed;top:56px;left:50%;transform:translateX(-50%) translateY(-13px);
  background:var(--panel);border:1px solid var(--gold-d);color:var(--gold);
  padding:8px 19px;border-radius:4px;font-family:'Cinzel',serif;font-size:10px;letter-spacing:2px;
  z-index:2000;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap;max-width:90vw;text-align:center}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.err{border-color:var(--red);color:var(--red-l)}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
</style>
</head>
<body>
<div class="toast" id="toast"></div>

<!-- TITLE -->
<div class="screen active" id="title-screen">
  <div class="logo-wrap">
    <div class="logo-eye">Card Game</div>
    <div class="logo-main">XENO</div>
    <div class="logo-sub">ゼノ</div>
    <div class="ob">Online Multiplayer</div>
  </div>
  <div id="conn-status" class="cbadge cerr">接続中...</div>
  <div class="div"></div>
  <div class="lcards">
    <div class="lc">
      <div class="lct">部屋を作成</div>
      <input class="inp" id="host-name" placeholder="あなたの名前" maxlength="12">
      <button class="btn btn-g" id="create-btn">部屋を作成する</button>
    </div>
    <div class="lc">
      <div class="lct">部屋に参加</div>
      <input class="inp" id="join-name" placeholder="あなたの名前" maxlength="12">
      <input class="inp cinp" id="join-code" placeholder="ROOM CODE" maxlength="6">
      <button class="btn btn-o" id="join-btn">参加する</button>
    </div>
  </div>
</div>

<!-- LOBBY -->
<div class="screen" id="lobby-screen">
  <div style="text-align:center">
    <div style="font-family:'Cinzel',serif;font-size:10px;letter-spacing:4px;color:var(--dim);margin-bottom:6px">ROOM CODE</div>
    <div class="cdsp" id="code-disp">------</div>
    <div class="chint">クリックでコードをコピー</div>
  </div>
  <div class="div" style="width:120px;margin:13px auto"></div>
  <div class="slbl">参加プレイヤー</div>
  <div class="plist" id="plist"></div>
  <div style="margin-top:16px;display:flex;flex-direction:column;gap:9px;width:100%;max-width:270px">
    <button class="btn btn-o" id="ready-btn">準備完了</button>
    <button class="btn btn-g" id="start-btn" style="display:none">ゲーム開始</button>
    <button class="btn btn-o btn-sm" id="leave-btn" style="width:auto;align-self:center;color:var(--dim)">退出する</button>
  </div>
</div>

<!-- GAME -->
<div class="screen" id="game-screen">
  <div class="gh">
    <div class="gtitle">XENO</div>
    <div class="ginfo">
      <div class="gst">山札 <span id="g-deck">-</span></div>
      <div class="gst">転生 <span id="g-reb">あり</span></div>
    </div>
  </div>
  <div class="tbar"><span>手番:</span><span class="tnm" id="g-turn">-</span><span id="g-sage"></span></div>
  <div class="pa" id="g-pa"></div>
  <div class="glog" id="glog"></div>
  <div class="apl">
    <div class="aplt" id="aplt">待機中</div>
    <div class="abtns" id="abtns"></div>
    <div class="cdsc" id="cdsc"></div>
  </div>
</div>

<!-- RESULT -->
<div class="screen" id="result-screen">
  <div class="rtl" id="rtl">GAME OVER</div>
  <div class="rwn" id="rwn"></div>
  <div class="rhands" id="rhands"></div>
  <button class="btn btn-g" style="max-width:230px;margin-top:5px" id="back-btn">タイトルへ戻る</button>
</div>

<!-- MODAL -->
<div class="mov" id="mov">
  <div class="mbox">
    <div class="mt" id="mt">-</div>
    <div class="mtx" id="mtx"></div>
    <div class="mbd" id="mbd"></div>
  </div>
</div>

<script type="module">
import { initializeApp }  from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getDatabase, ref, set, get, onValue, remove }
                          from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";
import { getAuth, signInAnonymously }
                          from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

function setConnBadge(ok, msg) {
  const el = q('conn-status');
  el.className = 'cbadge ' + (ok ? 'cok' : 'cerr');
  el.textContent = ok ? '接続済み' : '接続エラー（クリックで再試行）';
  el.style.cursor = ok ? 'default' : 'pointer';
  el.onclick = ok ? null : () => init();

}

/* ═══════════════════════════════════════
   ルーム管理
═══════════════════════════════════════ */
function genCode() {
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  return Array.from({length:6}, () => chars[Math.floor(Math.random()*chars.length)]).join('');
}

async function createRoom() {
  try {
    if (!myUid) { toast('Firebase接続中。少し待ってから再試行してください', true); return; }
    const name = q('host-name').value.trim() || 'ホスト';
    myName = name; isHost = true; myPid = 0;
    roomCode = genCode();
    toast('部屋を作成中...');
    const roomData = {
      code: roomCode,
      hostUid: myUid,
      status: 'lobby',
      players: [{ uid: myUid, name, ready: false, pid: 0 }],
      gsJson: null,
      createdAt: Date.now()
    };
    await saveRoom(roomCode, roomData);
    enterLobby();
  } catch(e) {
    console.error('createRoom:', e);
    toast('エラー: ' + e.message.slice(0, 60), true);
  }
}

async function joinRoom() {
  try {
    if (!myUid) { toast('Firebase接続中。少し待ってから再試行してください', true); return; }
    const name = q('join-name').value.trim() || 'ゲスト';
    const code = q('join-code').value.trim().toUpperCase();
    if (code.length < 4) { toast('ルームコードを入力してください', true); return; }
    toast('参加中...');
    const snap = await getRoom(code);
    if (!snap.exists()) { toast('部屋が見つかりません', true); return; }
    const room = snap.val();
    if (room.status !== 'lobby') { toast('ゲームはすでに始まっています', true); return; }
    const players = room.players ? Object.values(room.players) : [];
    if (players.length >= 4) { toast('部屋が満員です', true); return; }
    myName = name; isHost = false; roomCode = code;
    myPid = players.length;
    players.push({ uid: myUid, name, ready: false, pid: myPid });
    await setField(`rooms/${code}/players`, players);
    enterLobby();
  } catch(e) {
    console.error('joinRoom:', e);
    toast('エラー: ' + e.message.slice(0, 60), true);
  }
}

function enterLobby() {
  q('code-disp').textContent = roomCode;
  showScreen('lobby-screen');
  if (unsubRoom) unsubRoom();
  unsubRoom = listenRoom(roomCode, snap => {
    if (!snap.exists()) { backToTitle(); return; }
    const room = snap.val();
    if ((room.status === 'playing' || room.status === 'ended') && room.gsJson) {
      if (!q('game-screen').classList.contains('active')) {
        logLen = 0;
        showScreen('game-screen');
      }
      // gsJson は文字列 → JSON.parse で完全な配列構造を復元
      const gs = JSON.parse(room.gsJson);
      onGsReceived(gs);
    } else {
      renderLobby(room);
    }
  });
}

function renderLobby(room) {
  const players = room.players
    ? (Array.isArray(room.players) ? room.players : Object.values(room.players))
    : [];
  q('plist').innerHTML = players.map((p, i) => {
    const me = p.uid === myUid, host = i === 0, rdy = !!p.ready;
    return `<div class="pr ${rdy ? 'rdy' : ''}">
      <div class="pdot"></div>
      <div class="pnm">${p.name}${me ? ' (あなた)' : ''}</div>
      ${host ? '<span class="pbg bhost">HOST</span>' : ''}
      <span class="pbg ${rdy ? 'brdy' : 'bwait'}">${rdy ? '準備完了' : '待機中'}</span>
    </div>`;
  }).join('');

  const rb = q('ready-btn'), sb = q('start-btn');
  if (isHost) {
    rb.style.display = 'none';
    sb.style.display = '';
    const nonHost = players.slice(1);
    sb.disabled = !(nonHost.length > 0 && nonHost.every(p => p.ready) && players.length >= 2);
  } else {
    rb.style.display = '';
    sb.style.display = 'none';
    rb.textContent = localReady ? '準備中止' : '準備完了';
    rb.className = `btn ${localReady ? 'btn-g' : 'btn-o'}`;
  }
}

async function toggleReady() {
  localReady = !localReady;
  await setField(`rooms/${roomCode}/players/${myPid}/ready`, localReady);
}

async function startGame() {
  try {
    const snap = await getRoom(roomCode);
    const room = snap.val();
    const players = Array.isArray(room.players)
      ? room.players
      : Object.values(room.players);
    const gs = buildInitialGS(players);
    // statusとgsJsonを同時に書き込み
    await setField(`rooms/${roomCode}/status`, 'playing');
    await saveGS(roomCode, gs);
  } catch(e) {
    console.error('startGame:', e);
    toast('エラー: ' + e.message.slice(0, 60), true);
  }
}

/* ═══════════════════════════════════════
   ゲーム状態構築
═══════════════════════════════════════ */
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function buildDeck() {
  const deck = [];
  for (const r in CD) {
    const rank = +r;
    for (let i = 0; i < CD[rank].cnt; i++) deck.push({ rank, id: deck.length });
  }
  return shuffle(deck);
}

function buildInitialGS(roomPlayers) {
  const deck = buildDeck();
  const players = roomPlayers.map((rp, i) => ({
    id: i, uid: rp.uid, name: rp.name,
    hand: [], discards: [],
    eliminated: false, protected: false, sageMode: false
  }));
  for (const p of players) p.hand.push(deck.shift());
  const rebirthCard = deck.shift();
  return {
    players, deck, rebirthCard,
    rebirthUsed: false,
    currentTurn: 0,
    phase: 'draw',
    drawnId: null,
    boyPlayed: false,
    log: [],
    gameOver: false,
    winners: [],
    seq: 0
  };
}

/* ═══════════════════════════════════════
   リアルタイム受信ハンドラ
   JSON.parse済みの gs を受け取る（型は完全に保持）
═══════════════════════════════════════ */
function onGsReceived(gs) {
  lastGS = gs;

  if (gs.gameOver) {
    renderGame(gs);
    showResult(gs);
    return;
  }

  const cp = gs.players[gs.currentTurn];
  const isMyTurn = cp && cp.uid === myUid && !cp.eliminated;

  // 自分のターンかつdrawフェーズ → カードを引く処理を実行
  // seqで同一状態の二重実行を防ぐ
  if (gs.phase === 'draw' && isMyTurn && !processing && gs.seq !== lastSeq) {
    lastSeq = gs.seq;
    processing = true;
    execDraw(deepCopy(gs))
      .catch(e => console.error('execDraw error:', e))
      .finally(() => { processing = false; });
    return;
  }

  renderGame(gs);
}

/* ═══════════════════════════════════════
   Firebase書き込み（JSON文字列として保存）
═══════════════════════════════════════ */
async function pushGS(gs) {
  gs.seq = (gs.seq || 0) + 1;
  await saveGS(roomCode, gs);
}

/* ═══════════════════════════════════════
   ターンエンジン
═══════════════════════════════════════ */
async function execDraw(gs) {
  const p = gs.players[gs.currentTurn];

  // 賢者モード
  if (p.sageMode) {
    p.sageMode = false;
    const avail = Math.min(3, gs.deck.length);
    if (avail === 0) { await endGame(gs, 'deck'); return; }
    const drawn = gs.deck.splice(0, avail);
    addLog(gs, `${p.name} は賢者の効果で${avail}枚引きます。`, 'act');
    gs.phase = 'choose';
    await pushGS(gs);
    renderGame(gs);
    showSagePick(gs, drawn);
    return;
  }

  // 通常ドロー
  if (gs.deck.length === 0) { await endGame(gs, 'deck'); return; }
  const card = gs.deck.shift();
  gs.drawnId = card.id;
  p.hand.push(card);
  gs.phase = 'choose';
  addLog(gs, `${p.name} が山札からカードを引きました。`, 'act');
  await pushGS(gs);
  renderGame(gs);
}

async function advanceTurn(gs) {
  let next = (gs.currentTurn + 1) % gs.players.length;
  let tries = 0;
  while (gs.players[next].eliminated && tries < gs.players.length) {
    next = (next + 1) % gs.players.length;
    tries++;
  }
  if (tries >= gs.players.length) { await endGame(gs, 'all'); return; }
  gs.players[next].protected = false;
  gs.currentTurn = next;
  gs.phase = 'draw';
  gs.drawnId = null;
  await pushGS(gs);
}

async function endTurn(gs) {
  if (gs.deck.length === 0) { await endGame(gs, 'deck'); return; }
  await advanceTurn(gs);
}

async function playCard(handIndex) {
  if (processing) return;
  const gs = deepCopy(lastGS);
  const actor = gs.players[gs.currentTurn];
  const card = actor.hand[handIndex];
  if (card.rank === 10) { toast('英雄は場に出せません', true); return; }
  actor.hand.splice(handIndex, 1);
  actor.discards.push(card);
  gs.drawnId = null;
  pickedIdx = null;
  q('cdsc').classList.remove('vis');
  addLog(gs, `${actor.name} が「${card.rank} ${CD[card.rank].name}」を出しました。`, 'act');
  await resolveEffect(gs, card, actor);
}

/* ═══════════════════════════════════════
   カード効果
═══════════════════════════════════════ */
async function resolveEffect(gs, card, actor) {
  switch (card.rank) {
    case 9: await fx皇帝(gs, actor); break;
    case 8: await fx精霊(gs, actor); break;
    case 7: fx賢者(gs, actor); await endTurn(gs); break;
    case 6: await fx貴族(gs, actor); break;
    case 5: await fx死神(gs, actor); break;
    case 4: fx乙女(gs, actor); await endTurn(gs); break;
    case 3: await fx占師(gs, actor); break;
    case 2: await fx兵士(gs, actor); break;
    case 1: await fx少年(gs, actor); break;
    default: await endTurn(gs);
  }
}

async function fx皇帝(gs, actor, fromBoy = false) {
  const targets = alivePlayers(gs).filter(p => p.id !== actor.id && !p.protected);
  if (!targets.length) { addLog(gs, '対象なし', 'act'); await endTurn(gs); return; }
  gs.phase = 'effect-pending';
  await pushGS(gs); renderGame(gs);
  pickTarget('皇帝 - 公開処刑', '相手を指名してください', targets, async tgt => {
    if (!gs.deck.length) { addLog(gs, '山札なし', 'act'); await endTurn(gs); return; }
    tgt.hand.push(gs.deck.shift());
    addLog(gs, `${tgt.name} が山札から引きました（公開処刑）。`, 'act');
    pickCard(`皇帝 - ${tgt.name} の手札`, '捨てさせるカードを選んでください。', tgt.hand, async ci => {
      const disc = tgt.hand.splice(ci, 1)[0];
      tgt.discards.push(disc);
      addLog(gs, `${actor.name} が ${tgt.name} の「${disc.rank} ${CD[disc.rank].name}」を捨てさせました。`, 'act');
      if (disc.rank === 10) {
        addLog(gs, '英雄が皇帝に処刑！転生不可。', 'elim');
        eliminate(gs, tgt, false);
      } else if (!tgt.hand.length) eliminate(gs, tgt, false);
      if (!checkWin(gs)) await endTurn(gs);
    });
  });
}

async function fx貴族(gs, actor) {
  const targets = alivePlayers(gs).filter(p => p.id !== actor.id && !p.protected);

      if (guess === actual) {
        addLog(gs, `正解！${tgt.name} の手札は ${actual}${CD[actual].name}。脱落！`, 'elim');
        if (actual === 10) elimRebirth(gs, tgt); else eliminate(gs, tgt, true);
      } else {
        addLog(gs, '不正解。', 'act');
      }
      if (!checkWin(gs)) await endTurn(gs);
    }, { once: true });
  });
}

async function fx少年(gs, actor) {
  if (!gs.boyPlayed) {
    gs.boyPlayed = true;
    addLog(gs, '少年1枚目。効果なし（2枚目で公開処刑）。', 'act');
    await endTurn(gs);
  } else {
    addLog(gs, '少年2枚目！公開処刑発動！', 'imp');
    const targets = alivePlayers(gs).filter(p => p.id !== actor.id && !p.protected);
    if (!targets.length) { addLog(gs, '対象なし', 'act'); await endTurn(gs); return; }
    gs.phase = 'effect-pending';
    await pushGS(gs); renderGame(gs);
    pickTarget('少年(革命) - 公開処刑', '相手を指名してください', targets, async tgt => {
      if (!gs.deck.length) { addLog(gs, '山札なし', 'act'); await endTurn(gs); return; }
      tgt.hand.push(gs.deck.shift());
      pickCard(`少年 - ${tgt.name} の手札`, '捨てさせるカードを選んでください（英雄なら転生可）。', tgt.hand, async ci => {
        const disc = tgt.hand.splice(ci, 1)[0];
        tgt.discards.push(disc);
        addLog(gs, `${actor.name} が ${tgt.name} の「${disc.rank} ${CD[disc.rank].name}」を捨てさせました（少年）。`, 'act');
        if (disc.rank === 10) { addLog(gs, '英雄が少年で脱落→転生！', 'elim'); elimRebirth(gs, tgt); }
        else if (!tgt.hand.length) eliminate(gs, tgt, false);
        if (!checkWin(gs)) await endTurn(gs);
      });
    });
  }
}

function showSagePick(gs, drawn) {
  let sel = null;
  showModal('賢者 - 選択',
    `${gs.players[gs.currentTurn].name} が引いた${drawn.length}枚から1枚選んでください`,
    `<div class="mch">${drawn.map((c, i) => `<div class="mcc c${c.rank}" id="_sp${i}">${cardInner(c)}</div>`).join('')}</div>
     <div class="mbtns"><button class="btn btn-o btn-sm" id="_spok" disabled>選択</button></div>`
  );
  drawn.forEach((_, i) => {
    q(`_sp${i}`).addEventListener('click', () => {
      document.querySelectorAll('.mcc').forEach(e => e.classList.remove('on'));
      q(`_sp${i}`).classList.add('on');
      sel = i;
      q('_spok').disabled = false;
    });
  });
  q('_spok').addEventListener('click', async () => {
    if (sel === null) return;
    const chosen = drawn[sel];
    const rest   = drawn.filter((_, i) => i !== sel);
    const actor  = gs.players[gs.currentTurn];
    actor.hand.push(chosen);
    gs.deck.push(...rest);
    gs.deck = shuffle(gs.deck);
    gs.drawnId = chosen.id;
    gs.phase = 'choose';
    addLog(gs, `${actor.name} が「${chosen.rank} ${CD[chosen.rank].name}」を選びました。`, 'act');
    closeModal();
    await pushGS(gs);
    renderGame(gs);
  }, { once: true });
}

/* ═══════════════════════════════════════
   ゲームヘルパー
═══════════════════════════════════════ */
function alivePlayers(gs) { return gs.players.filter(p => !p.eliminated); }
function deepCopy(gs)     { return JSON.parse(JSON.stringify(gs)); }

function eliminate(gs, p, _rebirth) {
  if (p.eliminated) return;
  p.eliminated = true;
  const cards = p.hand.map(c => `${c.rank}${CD[c.rank].name}`).join(',');
  if (cards) addLog(gs, `${p.name} 脱落。手札: ${cards}`, 'elim');
  p.discards.push(...p.hand);
  p.hand = [];
}

function elimRebirth(gs, p) {
  if (!gs.rebirthUsed && gs.rebirthCard) {
    addLog(gs, `${p.name} の英雄が転生！`, 'imp');
    p.discards.push(...p.hand);
    p.hand = [];
    p.hand.push(gs.rebirthCard);
    gs.rebirthCard = null;
    gs.rebirthUsed = true;
    addLog(gs, `${p.name} が転生札「${p.hand[0].rank} ${CD[p.hand[0].rank].name}」で復帰！`, 'imp');
  } else {
    addLog(gs, `転生札なし。${p.name} 脱落。`, 'elim');
    eliminate(gs, p, false);
  }
}

function checkWin(gs) {
  const alive = alivePlayers(gs);
  if (alive.length <= 1) {
    endGame(gs, alive.length === 1 ? 'survivor' : 'all');
    return true;
  }
  return false;
}

async function endGame(gs, reason) {
  gs.gameOver = true;
  const alive = alivePlayers(gs);
  if (reason === 'survivor') {
    gs.winners = alive.map(p => p.id);
  } else if (reason === 'deck') {
    const mx = Math.max(...alive.map(p => p.hand[0]?.rank ?? 0));
    gs.winners = alive.filter(p => (p.hand[0]?.rank ?? 0) === mx).map(p => p.id);
  } else {
    gs.winners = [];
  }
  const wn = gs.winners.map(id => gs.players[id].name);
  addLog(gs, wn.length === 1 ? `${wn[0]} の勝利！` : wn.length > 1 ? `${wn.join('と')} が引き分け` : '引き分け', 'imp');
  await setField(`rooms/${roomCode}/status`, 'ended');
  await saveGS(roomCode, gs);
}

function addLog(gs, msg, type = 'act') {
  if (!gs.log) gs.log = [];
  gs.log.push({ msg, type });
  if (gs.log.length > 80) gs.log = gs.log.slice(-80);
}

/* ═══════════════════════════════════════
   描画
═══════════════════════════════════════ */
function renderGame(gs) {
  if (!gs) return;
  lastGS = gs;

  q('g-deck').textContent = gs.deck.length;
  q('g-reb').textContent  = gs.rebirthUsed ? 'なし' : 'あり';

  const cp      = gs.players[gs.currentTurn];
  const myTurn  = cp && cp.uid === myUid && !cp.eliminated;
  q('g-turn').textContent = cp ? cp.name : '-';
  q('g-sage').innerHTML   = cp && cp.sageMode
    ? `<span class="mytag" style="background:rgba(125,60,152,.2);border-color:var(--purple);color:#c39bd3">賢者モード</span>`
    : '';

  const pa = q('g-pa');
  pa.innerHTML = '';
  for (const p of gs.players) {
    const me = p.uid === myUid, act = p.id === gs.currentTurn;
    const div = document.createElement('div');
    div.className = `pz${act ? ' act' : ''}${p.eliminated ? ' ded' : ''}${p.protected ? ' prt' : ''}${me ? ' me' : ''}`;

    let badges = '';
    if (act && !p.eliminated) badges += `<span class="badge bt">手番</span>`;
    if (p.eliminated)         badges += `<span class="badge be">脱落</span>`;
    if (p.protected)          badges += `<span class="badge bp">守護</span>`;
    if (p.sageMode)           badges += `<span class="badge bs">賢者</span>`;
    if (me)                   badges += `<span class="badge bm">あなた</span>`;

    let handHTML = '';
    if (me && !p.eliminated) {
      const canPlay = act && gs.phase === 'choose';
      handHTML = p.hand.map((c, i) => {
        const drawn = gs.drawnId !== null && c.id === gs.drawnId;
        const sel   = pickedIdx === i;
        const noPlay = c.rank === 10;
        return `<div class="hc c${c.rank}${canPlay && !noPlay ? ' sp' : ''}${sel ? ' pk' : ''}"
          data-idx="${i}" data-ok="${canPlay && !noPlay ? 1 : 0}" title="${CD[c.rank].desc}">
          ${drawn ? '<div class="ddot"></div>' : ''}
          ${cardInner(c)}
        </div>`;
      }).join('');
    } else if (!p.eliminated) {
      handHTML = p.hand.map(() =>
        `<div class="hc back"><div class="ci"><div class="cr" style="color:var(--dim);font-size:13px">?</div></div></div>`
      ).join('');
    }

    const discHTML = p.discards.map(c =>
      `<div class="mc c${c.rank}">${cardInner(c, true)}</div>`
    ).join('');

    div.innerHTML =
      `<div class="pzhd"><div class="pd"></div><div class="pznm">${p.name}</div><div class="pbs">${badges}</div></div>
       <div class="pcs">${handHTML}${p.discards.length ? `<div class="sep"></div><div class="dp">${discHTML}</div>` : ''}</div>`;
    pa.appendChild(div);
  }

  // カードクリック委譲
  pa.querySelectorAll('.hc[data-ok="1"]').forEach(el => {
    el.addEventListener('click', () => {
      const idx = +el.dataset.idx;
      pickedIdx = idx;
      const c = lastGS.players[lastGS.currentTurn].hand[idx];
      q('cdsc').className = 'cdsc vis';
      q('cdsc').textContent = `${c.rank} ${CD[c.rank].name}（${CD[c.rank].eff}）: ${CD[c.rank].desc}`;
      renderGame(lastGS);
    });
  });

  // アクションパネル
  const atEl = q('aplt'), ab = q('abtns');
  ab.innerHTML = '';
  if (gs.gameOver) { atEl.textContent = 'ゲーム終了'; return; }
  if (!myTurn) {
    atEl.textContent = '他のプレイヤーの手番';
    ab.innerHTML = `<div class="wmsg">⏳ ${cp ? cp.name : '...'} が操作中...</div>`;
    return;
  }
  if (gs.phase === 'choose') {
    if (pickedIdx !== null) {
      const c = gs.players[gs.currentTurn].hand[pickedIdx];
      atEl.textContent = 'このカードを出しますか？';
      const okBtn = document.createElement('button');
      okBtn.className = 'ab cf';
      okBtn.textContent = `「${c.rank} ${CD[c.rank].name}」を出す`;
      okBtn.addEventListener('click', () => { const i = pickedIdx; pickedIdx = null; playCard(i); });
      const ngBtn = document.createElement('button');
      ngBtn.className = 'ab';
      ngBtn.textContent = 'キャンセル';
      ngBtn.addEventListener('click', () => { pickedIdx = null; q('cdsc').classList.remove('vis'); renderGame(lastGS); });
      ab.append(okBtn, ngBtn);
    } else {
      atEl.textContent = 'カードを選んでください';
      ab.innerHTML = `<span style="font-size:11px;color:var(--dim)">上のカードをクリックして選択</span>`;
    }
  } else if (gs.phase === 'effect-pending') {
    atEl.textContent = '効果を解決中...';
  } else {
    atEl.textContent = '処理中...';
  }

  // ログ追記
  if (gs.log && gs.log.length > logLen) {
    const logEl = q('glog');
    for (let i = logLen; i < gs.log.length; i++) {
      const e = gs.log[i];
      const d = document.createElement('div');
      d.className = `le l${e.type}`;
      d.textContent = e.msg;
      logEl.appendChild(d);
    }
    logEl.scrollTop = logEl.scrollHeight;
    logLen = gs.log.length;
  }
}

function showResult(gs) {
  setTimeout(() => {
    showScreen('result-screen');
    const wi = gs.winners || [];
    const wn = wi.map(id => gs.players[id].name);
    q('rtl').textContent = wn.length === 1 ? '勝利' : '引き分け';
    q('rwn').textContent = wn.length === 1
      ? `🏆 ${wn[0]} の勝利！`
      : wn.length > 1 ? `${wn.join(' と ')} が引き分け` : '全員脱落';
    q('rhands').innerHTML = gs.players.map(p => {
      const w = wi.includes(p.id), c = p.hand[0];
      return `<div class="rpc ${w ? 'w' : ''}">
        <div class="rpn">${p.name}${p.eliminated ? ' (脱落)' : ''}</div>
        ${c ? cardHTML(c, true) : '<div style="color:var(--dim);font-size:11px">手札なし</div>'}
      </div>`;
    }).join('');
  }, 700);
}

/* ═══════════════════════════════════════
   カードHTML
═══════════════════════════════════════ */
function cardInner(c, mini = false) {
  return `<div class="ci">
    <div class="cr">${c.rank}</div>
    <div class="cn">${CD[c.rank].name}</div>
    ${mini ? '' : `<div class="ce">${CD[c.rank].eff}</div>`}
  </div>`;
}
function cardHTML(c, large = false) {
  const s = large ? 'width:var(--cw);height:var(--ch)' : 'width:44px;height:64px';
  return `<div class="hc c${c.rank}" style="${s};border-radius:6px;border:1px solid">${cardInner(c)}</div>`;
}

/* ═══════════════════════════════════════
   モーダル
═══════════════════════════════════════ */
function showModal(title, text, body) {
  q('mt').textContent  = title;
  q('mtx').textContent = text;
  q('mbd').innerHTML   = body;
  q('mov').classList.add('on');
}
function closeModal() { q('mov').classList.remove('on'); }

function pickTarget(title, text, targets, cb) {
  showModal(title, text,
    `<div class="mtgts">${targets.map(t =>
      `<div class="tg" data-id="${t.id}">${t.name}</div>`
    ).join('')}</div>`
  );
  q('mbd').querySelectorAll('.tg').forEach(el => {
    el.addEventListener('click', () => {
      const tgt = lastGS.players[+el.dataset.id];
      closeModal();
      cb(tgt);
    }, { once: true });
  });
}

function pickCard(title, text, cards, cb) {
  let sel = null;
  showModal(title, text,
    `<div class="mch">${cards.map((c, i) =>
      `<div class="mcc c${c.rank}" data-ci="${i}">${cardInner(c)}</div>`
    ).join('')}</div>
     <div class="mbtns"><button class="btn btn-o btn-sm" id="_ccok" disabled>捨てさせる</button></div>`
  );
  q('mbd').querySelectorAll('.mcc').forEach(el => {
    el.addEventListener('click', () => {
      q('mbd').querySelectorAll('.mcc').forEach(e => e.classList.remove('on'));
      el.classList.add('on');
      sel = +el.dataset.ci;
      q('_ccok').disabled = false;
    });
  });
  q('_ccok').addEventListener('click', () => {
    if (sel === null) return;
    closeModal();
    cb(sel);
  }, { once: true });
}

/* ═══════════════════════════════════════
   ユーティリティ
═══════════════════════════════════════ */
function q(id)       { return document.getElementById(id); }
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  q(id).classList.add('active');
}
function toast(msg, err = false) {
  const t = q('toast');
  t.textContent = msg;
  t.className   = `toast on${err ? ' err' : ''}`;
  clearTimeout(window._tt);
  window._tt = setTimeout(() => t.classList.remove('on'), 2800);
}
function backToTitle() {
  if (unsubRoom) { unsubRoom(); unsubRoom = null; }
  logLen = 0; pickedIdx = null; localReady = false;
  processing = false; lastSeq = -1;
  showScreen('title-screen');
}

/* ═══════════════════════════════════════
   イベント登録
═══════════════════════════════════════ */
document.addEventListener('DOMContentLoaded', () => {
  q('create-btn').addEventListener('click', createRoom);
  q('join-btn')  .addEventListener('click', joinRoom);
  q('ready-btn') .addEventListener('click', toggleReady);
  q('start-btn') .addEventListener('click', startGame);
  q('leave-btn') .addEventListener('click', backToTitle);
  q('back-btn')  .addEventListener('click', backToTitle);
  q('code-disp') .addEventListener('click', () => {
    navigator.clipboard.writeText(roomCode)
      .then(() => toast('コードをコピーしました！'))
      .catch(() => toast(roomCode));
  });
  q('join-code').addEventListener('keydown', e => { if (e.key === 'Enter') joinRoom(); });
});

init();
</script>
